<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>headcount-log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:960px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1rem}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:#1D9E75;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.h-title{font-size:20px;font-weight:600;color:#111}
.h-sub{font-size:12px;color:#888;margin-top:2px}
.sync-status{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.sync-status.ok{background:#E1F5EE;color:#0F6E56}
.sync-status.loading{background:#fff3cd;color:#856404}
.sync-status.error{background:#fde8e8;color:#a32d2d}
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:8px 14px}
.search-bar i{color:#aaa;font-size:16px;flex-shrink:0}
.search-bar input{flex:1;border:none;outline:none;font-size:13px;color:#111;background:transparent;font-family:inherit}
.search-bar input::placeholder{color:#bbb}
.search-results{background:#fff;border:1px solid #e0e0d8;border-radius:10px;margin-bottom:1rem;overflow:hidden;display:none}
.search-result-item{padding:10px 16px;border-bottom:1px solid #f0f0ea;cursor:pointer;transition:background .1s}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:#f5f5f0}
.sri-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sri-path{font-size:11px;color:#aaa}
.sri-name{font-size:13px;font-weight:500;color:#111}
.sri-date{font-size:11px;color:#aaa;margin-left:auto}
.sri-chips{display:flex;gap:4px;flex-wrap:wrap}
.sri-chip{font-size:10px;padding:2px 6px;border-radius:4px;background:#f0f0ea;color:#555}
.sri-chip.hl{background:#E1F5EE;color:#0F6E56;font-weight:600}
.no-results{padding:1.5rem;text-align:center;color:#bbb;font-size:13px}
.tabs-wrap{display:flex;align-items:center;border-bottom:1px solid #e0e0d8;margin-bottom:1.25rem}
.tabs-scroll{display:flex;align-items:flex-end;flex:1;overflow-x:auto;scrollbar-width:none}
.tabs-scroll::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.active{color:#0F6E56;border-bottom-color:#1D9E75}
.tab:hover:not(.active){color:#333}
.tab-name{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cnt{font-size:11px;background:#eee;color:#666;border-radius:10px;padding:1px 6px;font-weight:400}
.tab.active .cnt{background:#E1F5EE;color:#0F6E56}
.tab-edit{font-size:11px;color:#ccc;padding:1px 3px;cursor:pointer;line-height:1;background:none;border:none;margin-left:1px}
.tab-edit:hover{color:#0F6E56}
.tab-del{font-size:12px;color:#ccc;padding:1px 3px;cursor:pointer;line-height:1;background:none;border:none;margin-left:1px}
.tab-del:hover{color:#c0392b}
.btn-addtab{display:flex;align-items:center;gap:4px;padding:7px 12px;border:none;background:none;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-addtab:hover{color:#0F6E56}
.panel{display:none}.panel.active{display:block}

/* 전체 현황 패널 */
.overview-panel{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.overview-title{font-size:14px;font-weight:600;color:#111;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.overview-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #f0f0ea}
.ov-filter-group{display:flex;align-items:center;gap:5px}
.ov-filter-group label{font-size:11px;font-weight:600;color:#666;white-space:nowrap}
.ov-filter-group select,.ov-filter-group input[type=date]{font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;outline:none;font-family:inherit}
.ov-filter-group select:focus,.ov-filter-group input:focus{border-color:#1D9E75}
.btn-ov-reset{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer}
.ov-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.ov-stat{background:#f5f5f0;border-radius:8px;padding:.75rem 1rem;text-align:center}
.ov-stat.total{background:#E1F5EE}
.ov-stat.male{background:#EBF4FF}
.ov-stat.female{background:#FEF0F5}
.ov-stat.recs{background:#f5f5f0}
.ov-stat-label{font-size:11px;color:#888;margin-bottom:3px}
.ov-stat-val{font-size:22px;font-weight:700;color:#111}
.ov-stat.total .ov-stat-val{color:#0F6E56}
.ov-stat.male .ov-stat-val{color:#2563EB}
.ov-stat.female .ov-stat-val{color:#DB2777}
.ov-age-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.ov-age-chip{display:flex;flex-direction:column;align-items:center;background:#f5f5f0;border-radius:8px;padding:6px 12px;min-width:60px}
.ov-age-chip-label{font-size:10px;color:#888;margin-bottom:2px}
.ov-age-chip-val{font-size:16px;font-weight:600;color:#333}
.chart-wrap{position:relative;height:220px;margin-bottom:1rem}
.ov-group-table{width:100%;border-collapse:collapse;font-size:12px}
.ov-group-table th{background:#f5f5f0;padding:7px 10px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #e8e8e0}
.ov-group-table td{padding:7px 10px;border-bottom:1px solid #f5f5f0;color:#333}
.ov-group-table tr:last-child td{border-bottom:none}
.ov-group-table tr:hover td{background:#fafaf8}
.ov-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;background:#E1F5EE;color:#0F6E56;font-weight:500}

/* 대시보드 */
.dashboard{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.dashboard-title{font-size:13px;font-weight:600;color:#444;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.dash-controls{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.dash-controls label{font-size:11px;color:#666;font-weight:600;white-space:nowrap}
.dash-controls select{font-size:12px;padding:3px 7px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;outline:none}
.dash-date-range{display:flex;align-items:center;gap:4px}
.dash-date-range input[type=date]{font-size:11px;padding:3px 6px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit;outline:none}
.dash-date-sep{font-size:11px;color:#aaa}
.btn-dash-reset{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer}
.dash-cnt-badge{font-size:11px;color:#aaa}
.dash-grid{display:grid;grid-template-columns:1fr 12px 1fr;gap:0;align-items:start}
.dash-divider{background:#e8e8e0;width:1px;margin:0 auto}
.dash-section-title{font-size:11px;font-weight:600;color:#888;margin-bottom:.4rem}
.dash-row{display:flex;gap:6px;flex-wrap:wrap}
.dash-chip{display:flex;flex-direction:column;align-items:center;border-radius:8px;padding:6px 10px;min-width:56px}
.dash-chip.total{background:#E1F5EE}
.dash-chip.male{background:#EBF4FF}
.dash-chip.female{background:#FEF0F5}
.dash-chip.age{background:#f5f5f0}
.dash-chip-label{font-size:10px;color:#888;margin-bottom:2px}
.dash-chip-val{font-size:15px;font-weight:600}
.dash-chip.total .dash-chip-val{color:#0F6E56}
.dash-chip.male .dash-chip-val{color:#2563EB}
.dash-chip.female .dash-chip-val{color:#DB2777}
.dash-chip.age .dash-chip-val{color:#333}

/* 레이아웃 */
.layout{display:grid;grid-template-columns:175px 1fr;gap:12px;min-height:280px}
.sidebar{display:flex;flex-direction:column;gap:4px}
.sg-item{display:flex;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#666;border:1px solid transparent;transition:all .15s;gap:4px}
.sg-item:hover{background:#f0f0ea;color:#333}
.sg-item.active{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB;font-weight:500}
.sg-item.pinned .sg-name::before{content:'📌 ';font-size:10px}
.sg-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sg-cnt{font-size:11px;opacity:.7;flex-shrink:0}
.sg-edit{font-size:11px;color:#ccc;padding:1px 3px;cursor:pointer;background:none;border:none;flex-shrink:0;opacity:0}
.sg-item:hover .sg-edit,.sg-item.active .sg-edit{opacity:1}
.sg-edit:hover{color:#0F6E56}
.btn-addsg{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:8px;border:1px dashed #ccc;background:none;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;width:100%}
.btn-addsg:hover{border-color:#1D9E75;color:#0F6E56}
.add-card{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:1rem;margin-bottom:.75rem}
.add-top-row{display:grid;grid-template-columns:120px 1fr;gap:8px;margin-bottom:.75rem}
.field-g label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px}
.field-g input{width:100%;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit;outline:none}
.field-g input:focus{border-color:#1D9E75}
.count-table-wrap{overflow-x:auto}
.count-table{width:100%;border-collapse:collapse;font-size:12px}
.count-table th{background:#f5f5f0;padding:6px 8px;text-align:center;font-weight:600;color:#555;border:1px solid #e8e8e0}
.count-table td{padding:4px 6px;border:1px solid #e8e8e0;text-align:center}
.count-table td input{width:58px;font-size:12px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;text-align:center;background:#fff;color:#111;font-family:inherit;outline:none}
.count-table td input:focus{border-color:#1D9E75}
.count-table .row-label{font-weight:600;color:#555;background:#f9f9f7;text-align:left;padding:6px 10px;white-space:nowrap}
.count-table .total-cell{background:#E1F5EE;color:#0F6E56;font-weight:600;font-size:13px}
.count-table .col-total{background:#f0f9f5;color:#0F6E56;font-weight:600}
.add-btn-row{display:flex;justify-content:flex-end;gap:6px;margin-top:.75rem}
.btn-add{display:flex;align-items:center;gap:4px;padding:7px 14px;border-radius:6px;background:#1D9E75;color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer}
.btn-add:hover{background:#0F6E56}
.btn-export{display:flex;align-items:center;gap:4px;padding:7px 12px;border-radius:6px;background:#fff;border:1px solid #ddd;color:#555;font-size:12px;cursor:pointer}
.btn-export:hover{border-color:#1D9E75;color:#0F6E56}

/* 목표 인원 */
.goal-bar-wrap{margin-bottom:.75rem;background:#f5f5f0;border-radius:8px;padding:.6rem .9rem}
.goal-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.goal-bar-label{font-size:11px;color:#666}
.goal-bar-pct{font-size:12px;font-weight:600;color:#0F6E56}
.goal-bar{height:6px;background:#e0e0d8;border-radius:3px;overflow:hidden}
.goal-bar-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .3s}
.goal-bar-fill.over{background:#f59e0b}
.btn-set-goal{font-size:11px;padding:2px 7px;border-radius:4px;border:1px dashed #1D9E75;background:none;color:#0F6E56;cursor:pointer;margin-left:8px}

/* 정기 템플릿 */
.template-section{margin-bottom:.75rem}
.template-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.template-label{font-size:12px;font-weight:600;color:#555}
.btn-add-tpl{font-size:11px;padding:3px 8px;border-radius:4px;border:1px dashed #1D9E75;background:none;color:#0F6E56;cursor:pointer}
.tpl-list{display:flex;flex-direction:column;gap:5px}
.tpl-item{display:flex;align-items:center;padding:8px 10px;background:#f0f9f5;border:1px solid #c8eedd;border-radius:8px;font-size:12px;gap:8px;flex-wrap:wrap}
.tpl-name{font-weight:600;color:#0F6E56;min-width:80px;flex-shrink:0}
.tpl-day{font-size:11px;color:#888;flex-shrink:0}
.tpl-stats{display:flex;align-items:center;gap:4px;flex:1;flex-wrap:wrap}
.tpl-stat-chip{display:flex;flex-direction:column;align-items:center;background:#fff;border:1px solid #e8e8e0;border-radius:6px;padding:3px 7px;min-width:44px}
.tpl-stat-chip.male{border-color:#BFDBFE;background:#EBF4FF}
.tpl-stat-chip.female{border-color:#FBCFE8;background:#FEF0F5}
.tpl-stat-chip.tl{border-color:#9FE1CB;background:#E1F5EE}
.tpl-stat-label{font-size:9px;color:#888}
.tpl-stat-val{font-size:12px;font-weight:600;color:#111}
.tpl-stat-chip.male .tpl-stat-val{color:#2563EB}
.tpl-stat-chip.female .tpl-stat-val{color:#DB2777}
.tpl-stat-chip.tl .tpl-stat-val{color:#0F6E56}
.tpl-btns{display:flex;gap:4px;flex-shrink:0;margin-left:auto}
.btn-tpl-use{font-size:11px;padding:4px 10px;border-radius:4px;background:#1D9E75;color:#fff;border:none;cursor:pointer;font-weight:500}
.btn-tpl-use:hover{background:#0F6E56}
.btn-tpl-edit{font-size:11px;padding:4px 7px;border-radius:4px;background:none;border:1px solid #9FE1CB;color:#0F6E56;cursor:pointer}
.btn-tpl-del{font-size:11px;padding:4px 6px;border-radius:4px;background:none;border:1px solid #ddd;color:#aaa;cursor:pointer}
.btn-tpl-del:hover{color:#c0392b;border-color:#c0392b}
.sg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.sg-title{font-size:15px;font-weight:600;color:#111;display:flex;align-items:center;gap:6px}
.sg-header-btns{display:flex;align-items:center;gap:4px}
.btn-editsg,.btn-pinsg{background:none;border:none;cursor:pointer;font-size:12px;color:#aaa;padding:3px 6px;border-radius:4px}
.btn-editsg:hover{color:#0F6E56}
.btn-pinsg:hover{color:#856404}
.btn-pinsg.pinned{color:#f59e0b}
.btn-delsg{background:none;border:none;cursor:pointer;font-size:12px;color:#bbb;padding:3px 6px;border-radius:4px}
.btn-delsg:hover{color:#c0392b}
.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:.75rem;background:#f0f0ea;border-radius:8px;padding:8px 10px;flex-wrap:wrap}
.filter-bar label{font-size:11px;font-weight:600;color:#666;white-space:nowrap}
.filter-bar input[type=date]{font-size:12px;padding:4px 7px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit}
.filter-bar input[type=date]:focus{outline:none;border-color:#1D9E75}
.filter-sep{font-size:12px;color:#aaa}
.btn-reset{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;margin-left:auto}
.filter-tag{font-size:11px;color:#0F6E56;background:#E1F5EE;border-radius:4px;padding:2px 7px;white-space:nowrap}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:.75rem}
.stat{background:#f0f0ea;border-radius:8px;padding:.6rem .8rem}
.stat-label{font-size:10px;color:#777;margin-bottom:2px}
.stat-val{font-size:18px;font-weight:600;color:#111}
.stat-unit{font-size:11px;font-weight:400;color:#888}
.records-list{display:flex;flex-direction:column;gap:6px}
.rec{background:#fff;border:1px solid #e8e8e0;border-radius:8px;padding:.7rem .9rem}
.rec:hover{border-color:#bbb}
.rec-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rec-left{display:flex;align-items:center;gap:10px}
.rec-date{font-size:11px;color:#aaa;flex-shrink:0;width:76px}
.rec-name{font-size:13px;color:#111;font-weight:500}
.rec-total{font-size:15px;font-weight:600;color:#0F6E56;flex-shrink:0}
.rec-unit{font-size:11px;color:#bbb}
.rec-btns{display:flex;align-items:center;gap:4px}
.btn-edit-rec,.btn-copy-rec,.btn-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:2px 4px;border-radius:4px;opacity:0}
.rec:hover .btn-edit-rec,.rec:hover .btn-copy-rec,.rec:hover .btn-del{opacity:1}
.btn-edit-rec:hover{color:#0F6E56}
.btn-copy-rec:hover{color:#856404}
.btn-del:hover{color:#c0392b}
.rec-detail{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.rdc{display:flex;flex-direction:column;align-items:center;border-radius:5px;padding:3px 7px;min-width:44px;background:#f5f5f0}
.rdc.m{background:#EBF4FF}.rdc.f{background:#FEF0F5}.rdc.t{background:#E1F5EE}
.rdc-label{font-size:9px;color:#888}
.rdc-val{font-size:12px;font-weight:600;color:#111}
.rdc.m .rdc-val{color:#2563EB}.rdc.f .rdc-val{color:#DB2777}.rdc.t .rdc-val{color:#0F6E56}
.rec-memo{font-size:12px;color:#888;font-style:italic;margin-top:2px}
.rec-change{font-size:11px;margin-left:6px}
.rec-change.up{color:#0F6E56}
.rec-change.down{color:#c0392b}
.empty{text-align:center;padding:2rem .5rem;color:#bbb;font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:.5rem;opacity:.4}
.no-sg{text-align:center;padding:3rem 1rem;color:#bbb;font-size:13px}
.no-sg i{font-size:32px;display:block;margin-bottom:.6rem;opacity:.3}
.no-cat{text-align:center;padding:4rem 1rem;color:#bbb;font-size:13px}
.no-cat i{font-size:36px;display:block;margin-bottom:.75rem;opacity:.3}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;border:1px solid #e8e8e0;width:420px;padding:1.25rem;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:.75rem;color:#111}
.modal-desc{font-size:12px;color:#888;margin-bottom:1rem;line-height:1.6}
.modal-desc strong{color:#c0392b;font-weight:600}
.modal-field{margin-bottom:.75rem}
.modal-field label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit;outline:none}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:#1D9E75}
.modal-field input.error{border-color:#c0392b;background:#fff8f8}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-count-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:.5rem}
.modal-count-table th{background:#f5f5f0;padding:6px 8px;text-align:center;font-weight:600;color:#555;border:1px solid #e8e8e0}
.modal-count-table td{padding:4px 5px;border:1px solid #e8e8e0;text-align:center}
.modal-count-table td input{width:50px;font-size:12px;padding:4px 5px;border:1px solid #ddd;border-radius:4px;text-align:center;background:#fff;color:#111;font-family:inherit;outline:none}
.modal-count-table td input:focus{border-color:#1D9E75}
.modal-count-table .row-label{font-weight:600;color:#555;background:#f9f9f7;text-align:left;padding:6px 8px}
.modal-count-table .total-cell{background:#E1F5EE;color:#0F6E56;font-weight:600}
.modal-count-table .col-total{background:#f0f9f5;color:#0F6E56;font-weight:600}
.modal-btns{display:flex;justify-content:flex-end;gap:6px;margin-top:.75rem}
.btn-cancel{padding:7px 14px;border-radius:6px;background:none;border:1px solid #ddd;font-size:13px;cursor:pointer;color:#444}
.btn-confirm{padding:7px 14px;border-radius:6px;background:#1D9E75;color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer}
.btn-confirm:hover{background:#0F6E56}
.btn-confirm.danger{background:#c0392b}
.btn-confirm.danger:hover{background:#a93226}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .3s ease}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){.layout{grid-template-columns:1fr}.add-top-row{grid-template-columns:1fr}.ov-stat-grid{grid-template-columns:repeat(2,1fr)}.dash-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-left">
      <div class="logo"><i class="ti ti-users"></i></div>
      <div><div class="h-title">headcount-log</div><div class="h-sub">카테고리 → 그룹 → 날짜별 인원 기록</div></div>
    </div>
    <div id="sync-status" class="sync-status loading">⏳ 불러오는 중...</div>
  </div>
  <div class="search-bar">
    <i class="ti ti-search"></i>
    <input type="text" id="global-search" placeholder="행사명, 날짜, 그룹명으로 검색..." autocomplete="off">
    <button id="search-clear" style="background:none;border:none;cursor:pointer;color:#bbb;font-size:13px;display:none">✕</button>
  </div>
  <div class="search-results" id="search-results"></div>
  <div class="tabs-wrap">
    <div class="tabs-scroll" id="tabs-scroll"></div>
    <button class="btn-addtab" id="btn-addtab"><i class="ti ti-plus" style="font-size:13px"></i> 카테고리 추가</button>
  </div>
  <div id="panels"></div>
</div>
<div id="modal" style="display:none" class="modal-bg">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="modal-desc" id="modal-desc"></div>
    <div id="modal-fields"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">취소</button>
      <button class="btn-confirm" id="modal-confirm">확인</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var API_URL='https://script.google.com/macros/s/AKfycbyZCKM23bF17ET2aV6nPS_V9Ot3DMGHa-yw7QEZcPwbnCxM2wqjEWHklVzOpE2T8enYqA/exec';
var AGES=['유아','청소년','대학생','성인'];
var DAYS=['일','월','화','수','목','금','토'];
var MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
var state={cats:[],data:{}};
var curCat='overview',curSg={},filters={};
var dashSg={},dashFrom={},dashTo={};
var ovCat='all',ovSg='all',ovFrom='',ovTo='';
var pinnedSgs={};
var monthChartInstance=null;
var modalMode=null,modalCat=null,modalDelTarget=null,modalRecTarget=null;
var DEFAULT_CATS=[{id:'biz',name:'사업'},{id:'club',name:'동아리'},{id:'reg',name:'정기형'}];

function setStatus(t,m){var el=document.getElementById('sync-status');el.className='sync-status '+t;el.textContent=m;}
function stateToRows(){return[[JSON.stringify(state)]];}
function rowsToState(rows){if(!rows||!rows.length||!rows[0][0])return null;try{return JSON.parse(rows[0][0]);}catch(e){return null;}}

function loadFromSheet(){
  setStatus('loading','⏳ 불러오는 중...');
  fetch(API_URL+'?action=load').then(function(r){return r.json();}).then(function(res){
    if(res.ok&&res.data){var p=rowsToState(res.data);if(p&&p.cats&&p.cats.length)state=p;else initDefault();}
    else initDefault();
    afterLoad();setStatus('ok','✅ 동기화됨');
  }).catch(function(){initDefault();afterLoad();setStatus('error','⚠️ 오프라인 모드');});
}

function saveToSheet(){
  setStatus('loading','💾 저장 중...');
  var payload=JSON.stringify(stateToRows());
  var url=API_URL+'?action=save&payload='+encodeURIComponent(payload);
  fetch(url,{method:'GET'})
    .then(function(r){return r.json();})
    .then(function(res){setStatus(res.ok?'ok':'error',res.ok?'✅ 저장됨':'⚠️ 저장 실패');})
    .catch(function(){setStatus('error','⚠️ 저장 실패');});
}

function initDefault(){
  state={cats:DEFAULT_CATS.slice(),data:{}};
  state.cats.forEach(function(c){state.data[c.id]={groups:[],records:{},templates:{},goals:{},pins:[]};});
}
function afterLoad(){
  state.cats.forEach(function(c){
    if(!state.data[c.id])state.data[c.id]={groups:[],records:{},templates:{},goals:{},pins:[]};
    var d=state.data[c.id];
    if(!d.templates)d.templates={};
    if(!d.goals)d.goals={};
    if(!d.pins)d.pins=[];
    if(!curSg[c.id]&&d.groups.length)curSg[c.id]=d.groups[0].id;
    if(!filters[c.id])filters[c.id]={from:'',to:''};
    if(!dashSg[c.id])dashSg[c.id]='all';
    if(!dashFrom[c.id])dashFrom[c.id]='';
    if(!dashTo[c.id])dashTo[c.id]='';
  });
  render();
}
function persist(){saveToSheet();}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function totalGroups(catId){return state.data[catId]&&state.data[catId].groups?state.data[catId].groups.length:0;}
function applyFilter(recs,catId){var f=filters[catId]||{};return recs.filter(function(r){if(f.from&&r.date<f.from)return false;if(f.to&&r.date>f.to)return false;return true;});}
function applyDateRange(recs,from,to){return recs.filter(function(r){if(from&&r.date<from)return false;if(to&&r.date>to)return false;return true;});}
function sumCounts(c){return AGES.reduce(function(s,a){return s+Number(c['m_'+a]||0)+Number(c['f_'+a]||0);},0);}
function maleTotal(c){return AGES.reduce(function(s,a){return s+Number(c['m_'+a]||0);},0);}
function femaleTotal(c){return AGES.reduce(function(s,a){return s+Number(c['f_'+a]||0);},0);}
function ageTotal(c,age){return Number(c['m_'+age]||0)+Number(c['f_'+age]||0);}
function accumStats(recs){
  var r={total:0,male:0,female:0};
  AGES.forEach(function(a){r['m_'+a]=0;r['f_'+a]=0;r[a]=0;});
  recs.forEach(function(rec){var c=rec.counts||{};r.male+=maleTotal(c);r.female+=femaleTotal(c);AGES.forEach(function(a){r['m_'+a]+=Number(c['m_'+a]||0);r['f_'+a]+=Number(c['f_'+a]||0);r[a]+=ageTotal(c,a);});});
  r.total=r.male+r.female;return r;
}
function getAllRecs(catId,sgId,from,to){
  var d=state.data[catId];if(!d)return[];
  var recs=[];
  if(sgId==='all'){d.groups.forEach(function(g){(d.records[g.id]||[]).forEach(function(r){recs.push(r);});});}
  else{recs=d.records[sgId]||[];}
  return applyDateRange(recs,from,to);
}

// 인원표 HTML
function countTableHtml(prefix,counts,cls){
  counts=counts||{};cls=cls||'count-table';
  var h='<div class="count-table-wrap"><table class="'+cls+'"><thead><tr><th></th>';
  AGES.forEach(function(a){h+='<th>'+a+'</th>';});h+='<th>합계</th></tr></thead><tbody>';
  ['남','여'].forEach(function(g){var k=g==='남'?'m':'f';h+='<tr><td class="row-label">'+g+'</td>';AGES.forEach(function(a){h+='<td><input type="number" min="0" id="'+prefix+'_'+k+'_'+a+'" value="'+(counts[k+'_'+a]||0)+'" oninput="updateTotals(\''+prefix+'\')"></td>';});h+='<td class="col-total" id="'+prefix+'_tot_'+k+'">0</td></tr>';});
  h+='<tr><td class="row-label">합계</td>';AGES.forEach(function(a){h+='<td class="col-total" id="'+prefix+'_tot_'+a+'">0</td>';});h+='<td class="total-cell" id="'+prefix+'_tot_all">0</td></tr></tbody></table></div>';
  return h;
}
function updateTotals(prefix){
  var tot=0,m=0,f=0;
  AGES.forEach(function(a){var mv=Number(document.getElementById(prefix+'_m_'+a)?.value||0);var fv=Number(document.getElementById(prefix+'_f_'+a)?.value||0);m+=mv;f+=fv;tot+=mv+fv;var el=document.getElementById(prefix+'_tot_'+a);if(el)el.textContent=mv+fv;});
  var em=document.getElementById(prefix+'_tot_m');if(em)em.textContent=m;
  var ef=document.getElementById(prefix+'_tot_f');if(ef)ef.textContent=f;
  var et=document.getElementById(prefix+'_tot_all');if(et)et.textContent=tot;
}
function getTableCounts(prefix){var c={};AGES.forEach(function(a){c['m_'+a]=Number(document.getElementById(prefix+'_m_'+a)?.value||0);c['f_'+a]=Number(document.getElementById(prefix+'_f_'+a)?.value||0);});return c;}

// CSV 내보내기
function exportCSV(catId,sgId){
  var d=state.data[catId];if(!d)return;
  var catName=state.cats.find(function(c){return c.id===catId;})?.name||catId;
  var rows=[['카테고리','그룹','날짜','행사명','총인원','남','여'].concat(AGES).concat(AGES.map(function(a){return '남_'+a;})).concat(AGES.map(function(a){return '여_'+a;})).concat(['메모'])];
  var groups=sgId==='all'?d.groups:[d.groups.find(function(g){return g.id===sgId;})].filter(Boolean);
  groups.forEach(function(g){
    (d.records[g.id]||[]).forEach(function(r){
      var c=r.counts||{};
      rows.push([catName,g.name,r.date,r.name,sumCounts(c),maleTotal(c),femaleTotal(c)].concat(AGES.map(function(a){return ageTotal(c,a);})).concat(AGES.map(function(a){return Number(c['m_'+a]||0);})).concat(AGES.map(function(a){return Number(c['f_'+a]||0);})).concat([r.memo||'']));
    });
  });
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='headcount_'+catName+'_'+today()+'.csv';a.click();URL.revokeObjectURL(url);
  showToast('CSV 파일이 다운로드되었습니다');
}

// 월별 차트
function buildMonthChart(recs,canvasId){
  if(monthChartInstance){monthChartInstance.destroy();monthChartInstance=null;}
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var monthMap={};
  recs.forEach(function(r){var ym=r.date.slice(0,7);if(!monthMap[ym])monthMap[ym]=0;monthMap[ym]+=sumCounts(r.counts||{});});
  var labels=Object.keys(monthMap).sort();
  var data=labels.map(function(l){return monthMap[l];});
  monthChartInstance=new Chart(canvas,{type:'bar',data:{labels:labels,datasets:[{label:'인원',data:data,backgroundColor:'#1D9E75aa',borderColor:'#1D9E75',borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}

// 전체 현황 패널
function buildOverviewPanel(){
  var catOptions='<option value="all">전체 카테고리</option>';
  state.cats.forEach(function(c){catOptions+='<option value="'+c.id+'"'+(ovCat===c.id?' selected':'')+'>'+esc(c.name)+'</option>';});
  var sgOptions='<option value="all">전체 그룹</option>';
  if(ovCat!=='all'&&state.data[ovCat]){state.data[ovCat].groups.forEach(function(g){sgOptions+='<option value="'+g.id+'"'+(ovSg===g.id?' selected':'')+'>'+esc(g.name)+'</option>';});}
  var allRecs=[];
  if(ovCat==='all'){state.cats.forEach(function(c){var d=state.data[c.id];if(d)d.groups.forEach(function(g){(d.records[g.id]||[]).forEach(function(r){allRecs.push({r:r,catId:c.id,catName:c.name,gName:g.name,gId:g.id});});});});}
  else{var d=state.data[ovCat];if(d){if(ovSg==='all'){d.groups.forEach(function(g){(d.records[g.id]||[]).forEach(function(r){allRecs.push({r:r,catId:ovCat,catName:state.cats.find(function(c){return c.id===ovCat;})?.name||'',gName:g.name,gId:g.id});});});}else{(d.records[ovSg]||[]).forEach(function(r){allRecs.push({r:r,catId:ovCat,catName:state.cats.find(function(c){return c.id===ovCat;})?.name||'',gName:d.groups.find(function(g){return g.id===ovSg;})?.name||'',gId:ovSg});});}}}
  var filtered=allRecs.filter(function(x){if(ovFrom&&x.r.date<ovFrom)return false;if(ovTo&&x.r.date>ovTo)return false;return true;});
  var st=accumStats(filtered.map(function(x){return x.r;}));
  var hasFilter=ovFrom||ovTo||(ovCat!=='all')||(ovSg!=='all');

  // 그룹별 요약 테이블
  var groupMap={};
  filtered.forEach(function(x){var key=x.catId+'_'+x.gId;if(!groupMap[key])groupMap[key]={catName:x.catName,gName:x.gName,recs:[]};groupMap[key].recs.push(x.r);});
  var groupRows=Object.values(groupMap).map(function(g){var gs=accumStats(g.recs);return{catName:g.catName,gName:g.gName,total:gs.total,male:gs.male,female:gs.female,cnt:g.recs.length};});
  groupRows.sort(function(a,b){return b.total-a.total;});

  var tableRows=groupRows.map(function(g){
    return '<tr><td><span class="ov-badge">'+esc(g.catName)+'</span></td><td>'+esc(g.gName)+'</td><td style="font-weight:600;color:#0F6E56">'+g.total+'</td><td style="color:#2563EB">'+g.male+'</td><td style="color:#DB2777">'+g.female+'</td><td>'+g.cnt+'건</td></tr>';
  }).join('');

  return '<div class="overview-panel">'
    +'<div class="overview-title"><i class="ti ti-layout-dashboard" style="font-size:15px;color:#1D9E75"></i> 전체 인원 현황</div>'
    +'<div class="overview-filters">'
    +'<div class="ov-filter-group"><label>카테고리</label><select id="ov-cat-sel" onchange="changeOvCat(this.value)">'+catOptions+'</select></div>'
    +(ovCat!=='all'?'<div class="ov-filter-group"><label>그룹</label><select id="ov-sg-sel" onchange="changeOvSg(this.value)">'+sgOptions+'</select></div>':'')
    +'<div class="ov-filter-group"><label>기간</label><input type="date" value="'+ovFrom+'" onchange="ovFrom=this.value;renderPanels()"><span style="font-size:11px;color:#aaa">~</span><input type="date" value="'+ovTo+'" onchange="ovTo=this.value;renderPanels()"></div>'
    +(hasFilter?'<button class="btn-ov-reset" onclick="resetOvFilter()">초기화</button>':'')
    +'<span style="font-size:11px;color:#aaa;margin-left:4px">'+filtered.length+'건</span>'
    +'</div>'
    +'<div class="ov-stat-grid">'
    +'<div class="ov-stat total"><div class="ov-stat-label">총 인원</div><div class="ov-stat-val">'+st.total.toLocaleString()+'</div></div>'
    +'<div class="ov-stat male"><div class="ov-stat-label">남</div><div class="ov-stat-val">'+st.male.toLocaleString()+'</div></div>'
    +'<div class="ov-stat female"><div class="ov-stat-label">여</div><div class="ov-stat-val">'+st.female.toLocaleString()+'</div></div>'
    +'<div class="ov-stat recs"><div class="ov-stat-label">기록 건수</div><div class="ov-stat-val">'+filtered.length+'</div></div>'
    +'</div>'
    +'<div class="ov-age-row">'+AGES.map(function(a){return '<div class="ov-age-chip"><div class="ov-age-chip-label">'+a+'</div><div class="ov-age-chip-val">'+st[a]+'</div></div>';}).join('')+'</div>'
    +'<div class="chart-wrap"><canvas id="overview-chart"></canvas></div>'
    +(groupRows.length?'<table class="ov-group-table"><thead><tr><th>카테고리</th><th>그룹</th><th>총인원</th><th>남</th><th>여</th><th>건수</th></tr></thead><tbody>'+tableRows+'</tbody></table>':'')
    +'</div>';
}

function changeOvCat(val){ovCat=val;ovSg='all';renderPanels();}
function changeOvSg(val){ovSg=val;renderPanels();}
function resetOvFilter(){ovCat='all';ovSg='all';ovFrom='';ovTo='';renderPanels();}

// 대시보드
function dashboardHtml(catId){
  var d=state.data[catId];if(!d||!d.groups.length)return'';
  var selSg=dashSg[catId]||'all';var from=dashFrom[catId]||'';var to=dashTo[catId]||'';
  var recs=getAllRecs(catId,selSg,from,to);var st=accumStats(recs);
  var groupOptions='<option value="all">전체 (모든 그룹)</option>';
  d.groups.forEach(function(g){groupOptions+='<option value="'+g.id+'"'+(selSg===g.id?' selected':'')+'>'+esc(g.name)+'</option>';});
  var hasDateFilter=from||to;
  return '<div class="dashboard">'
    +'<div class="dashboard-title"><i class="ti ti-chart-bar" style="font-size:15px;color:#1D9E75"></i> 인원 현황</div>'
    +'<div class="dash-controls">'
    +'<label>범위</label><select onchange="changeDashSg(\''+catId+'\',this.value)">'+groupOptions+'</select>'
    +'<label style="margin-left:8px">기간</label>'
    +'<div class="dash-date-range"><input type="date" value="'+from+'" onchange="changeDashDate(\''+catId+'\',\'from\',this.value)"><span class="dash-date-sep">~</span><input type="date" value="'+to+'" onchange="changeDashDate(\''+catId+'\',\'to\',this.value)"></div>'
    +(hasDateFilter?'<button class="btn-dash-reset" onclick="resetDashDate(\''+catId+'\')">초기화</button>':'')
    +'<span class="dash-cnt-badge">'+recs.length+'건</span>'
    +'<button class="btn-export" onclick="exportCSV(\''+catId+'\',\''+selSg+'\')" style="margin-left:auto"><i class="ti ti-download" style="font-size:13px"></i> CSV</button>'
    +'</div>'
    +'<div class="dash-grid">'
    +'<div><div class="dash-section-title">성별</div><div class="dash-row">'
    +'<div class="dash-chip total"><div class="dash-chip-label">총 인원</div><div class="dash-chip-val">'+st.total+'</div></div>'
    +'<div class="dash-chip male"><div class="dash-chip-label">남</div><div class="dash-chip-val">'+st.male+'</div></div>'
    +'<div class="dash-chip female"><div class="dash-chip-label">여</div><div class="dash-chip-val">'+st.female+'</div></div>'
    +'</div></div><div class="dash-divider"></div>'
    +'<div><div class="dash-section-title">연령대</div><div class="dash-row">'
    +AGES.map(function(a){return '<div class="dash-chip age"><div class="dash-chip-label">'+a+'</div><div class="dash-chip-val">'+st[a]+'</div></div>';}).join('')
    +'</div></div></div></div>';
}
function changeDashSg(catId,val){dashSg[catId]=val;renderPanels();}
function changeDashDate(catId,key,val){if(key==='from')dashFrom[catId]=val;else dashTo[catId]=val;renderPanels();}
function resetDashDate(catId){dashFrom[catId]='';dashTo[catId]='';renderPanels();}

// 검색
function doSearch(q){
  var res=document.getElementById('search-results');var clearBtn=document.getElementById('search-clear');
  if(!q){res.style.display='none';clearBtn.style.display='none';return;}
  clearBtn.style.display='block';q=q.toLowerCase();var items=[];
  state.cats.forEach(function(cat){var d=state.data[cat.id];if(!d)return;d.groups.forEach(function(g){(d.records[g.id]||[]).forEach(function(r){if(r.name.toLowerCase().indexOf(q)>=0||r.date.indexOf(q)>=0||g.name.toLowerCase().indexOf(q)>=0||cat.name.toLowerCase().indexOf(q)>=0)items.push({cat:cat,group:g,rec:r});});});});
  if(!items.length){res.style.display='block';res.innerHTML='<div class="no-results">검색 결과가 없어요</div>';return;}
  items.sort(function(a,b){return b.rec.date.localeCompare(a.rec.date);});
  res.style.display='block';
  res.innerHTML=items.slice(0,20).map(function(item){
    var c=item.rec.counts||{};var tot=sumCounts(c),m=maleTotal(c),f=femaleTotal(c);
    return '<div class="search-result-item" data-cat="'+item.cat.id+'" data-sg="'+item.group.id+'">'
      +'<div class="sri-top"><span class="sri-path">'+esc(item.cat.name)+' › '+esc(item.group.name)+'</span><span class="sri-name">'+esc(item.rec.name)+'</span><span class="sri-date">'+item.rec.date+'</span></div>'
      +'<div class="sri-chips"><span class="sri-chip hl">총 '+tot+'명</span><span class="sri-chip">남 '+m+'</span><span class="sri-chip">여 '+f+'</span>'
      +AGES.map(function(a){return ageTotal(c,a)>0?'<span class="sri-chip">'+a+' '+ageTotal(c,a)+'</span>':'';}).join('')+'</div></div>';
  }).join('');
  res.querySelectorAll('.search-result-item').forEach(function(el){
    el.addEventListener('click',function(){
      var catId=el.getAttribute('data-cat');var sgId=el.getAttribute('data-sg');
      curCat=catId;curSg[catId]=sgId;render();
      document.getElementById('global-search').value='';res.style.display='none';clearBtn.style.display='none';
      showToast('해당 그룹으로 이동했어요');
    });
  });
}

function render(){renderTabs();renderPanels();}

function renderTabs(){
  var overviewTab='<button class="tab'+(curCat==='overview'?' active':'')+'" id="tab-overview"><i class="ti ti-layout-dashboard" style="font-size:13px"></i>전체 현황</button>';
  var catTabs=state.cats.map(function(c){
    return '<button class="tab'+(curCat===c.id?' active':'')+'" data-cat="'+c.id+'">'
      +'<span class="tab-name">'+esc(c.name)+'</span><span class="cnt">'+totalGroups(c.id)+'</span>'
      +'<span class="tab-edit" data-edit="'+c.id+'">✎</span>'
      +'<span class="tab-del" data-del="'+c.id+'">×</span>'
      +'</button>';
  }).join('');
  document.getElementById('tabs-scroll').innerHTML=overviewTab+catTabs;
  document.getElementById('tab-overview').addEventListener('click',function(){curCat='overview';render();});
  document.querySelectorAll('.tab[data-cat]').forEach(function(btn){
    btn.addEventListener('click',function(e){
      if(e.target.classList.contains('tab-del')||e.target.classList.contains('tab-edit'))return;
      curCat=btn.getAttribute('data-cat');render();
    });
  });
  document.querySelectorAll('.tab-edit').forEach(function(s){s.addEventListener('click',function(e){e.stopPropagation();openEdit('cat',s.getAttribute('data-edit'));});});
  document.querySelectorAll('.tab-del').forEach(function(s){s.addEventListener('click',function(e){e.stopPropagation();openDel('cat',s.getAttribute('data-del'));});});
}

function renderPanels(){
  if(curCat==='overview'){
    document.getElementById('panels').innerHTML='<div id="panel-overview" class="panel active">'+buildOverviewPanel()+'</div>';
    setTimeout(function(){
      var allRecs=[];
      state.cats.forEach(function(c){var d=state.data[c.id];if(d)d.groups.forEach(function(g){(d.records[g.id]||[]).forEach(function(r){allRecs.push(r);});});});
      buildMonthChart(allRecs,'overview-chart');
    },50);
    return;
  }
  if(!state.cats.length){document.getElementById('panels').innerHTML='<div class="no-cat"><i class="ti ti-layout-grid-add"></i>위의 "+ 카테고리 추가" 버튼으로 카테고리를 만들어 보세요</div>';return;}
  document.getElementById('panels').innerHTML=state.cats.map(function(c){
    return '<div id="panel-'+c.id+'" class="panel'+(curCat===c.id?' active':'')+'">'+buildPanel(c.id)+'</div>';
  }).join('');
  state.cats.forEach(function(c){
    var panel=document.getElementById('panel-'+c.id);if(!panel)return;
    panel.querySelectorAll('.sg-item').forEach(function(el){el.addEventListener('click',function(e){if(e.target.classList.contains('sg-edit'))return;selectSg(el.getAttribute('data-cat'),el.getAttribute('data-sg'));});});
    panel.querySelectorAll('.sg-edit').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();openEdit('sg',b.getAttribute('data-cat'),b.getAttribute('data-sg'));});});
    var as=panel.querySelector('.btn-addsg');if(as)as.addEventListener('click',function(){openModal('sg',c.id);});
    var es=panel.querySelector('.btn-editsg');if(es)es.addEventListener('click',function(){openEdit('sg',es.getAttribute('data-cat'),es.getAttribute('data-sg'));});
    var ps=panel.querySelector('.btn-pinsg');if(ps)ps.addEventListener('click',function(){togglePin(ps.getAttribute('data-cat'),ps.getAttribute('data-sg'));});
    var ds=panel.querySelector('.btn-delsg');if(ds)ds.addEventListener('click',function(){openDel('sg',ds.getAttribute('data-cat'),ds.getAttribute('data-sg'));});
    var ar=panel.querySelector('.btn-add');if(ar)ar.addEventListener('click',function(){addRecord(ar.getAttribute('data-cat'),ar.getAttribute('data-sg'));});
    var sg=panel.querySelector('.btn-set-goal');if(sg)sg.addEventListener('click',function(){openSetGoal(sg.getAttribute('data-cat'),sg.getAttribute('data-sg'));});
    panel.querySelectorAll('.btn-edit-rec').forEach(function(b){b.addEventListener('click',function(){openEditRec(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-rec'));});});
    panel.querySelectorAll('.btn-copy-rec').forEach(function(b){b.addEventListener('click',function(){copyRecord(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-rec'));});});
    panel.querySelectorAll('.btn-del').forEach(function(b){b.addEventListener('click',function(){delRecord(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-rec'));});});
    panel.querySelectorAll('.btn-tpl-use').forEach(function(b){b.addEventListener('click',function(){useTpl(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-tpl'));});});
    panel.querySelectorAll('.btn-tpl-edit').forEach(function(b){b.addEventListener('click',function(){openEditTpl(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-tpl'));});});
    panel.querySelectorAll('.btn-tpl-del').forEach(function(b){b.addEventListener('click',function(){delTpl(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-tpl'));});});
    var atb=panel.querySelector('.btn-add-tpl');if(atb)atb.addEventListener('click',function(){openAddTpl(atb.getAttribute('data-cat'),atb.getAttribute('data-sg'));});
    var fi=panel.querySelector('.filter-from'),ti=panel.querySelector('.filter-to');
    if(fi)fi.addEventListener('change',function(){setFilter(c.id,'from',fi.value);});
    if(ti)ti.addEventListener('change',function(){setFilter(c.id,'to',ti.value);});
    var rb=panel.querySelector('.btn-reset');if(rb)rb.addEventListener('click',function(){resetFilter(c.id);});
    updateTotals('add-'+c.id);
  });
}

function buildPanel(catId){
  var d=state.data[catId]||{groups:[],records:{},templates:{},goals:{},pins:[]};
  var groups=d.groups,records=d.records,templates=d.templates||{},goals=d.goals||{},pins=d.pins||[];
  var activeSg=curSg[catId];
  var f=filters[catId]||{from:'',to:''},hasFilter=f.from||f.to;

  // 즐겨찾기 정렬
  var sortedGroups=groups.slice().sort(function(a,b){var ap=pins.indexOf(a.id)>=0?0:1;var bp=pins.indexOf(b.id)>=0?0:1;return ap-bp;});

  var sidebarHtml=sortedGroups.map(function(g){
    var cnt=applyFilter(records[g.id]||[],catId).length;var isPinned=pins.indexOf(g.id)>=0;
    return '<div class="sg-item'+(activeSg===g.id?' active':'')+(isPinned?' pinned':'')+'" data-cat="'+catId+'" data-sg="'+g.id+'">'
      +'<span class="sg-name">'+esc(g.name)+'</span><span class="sg-cnt">'+cnt+'</span>'
      +'<button class="sg-edit" data-cat="'+catId+'" data-sg="'+g.id+'">✎</button></div>';
  }).join('');

  var showContent=!!(activeSg&&groups.find(function(g){return g.id===activeSg;}));
  var g=showContent?groups.find(function(g){return g.id===activeSg;}):null;
  var recs=showContent?applyFilter(records[activeSg]||[],catId):[];
  var sorted=recs.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var totalPeople=recs.reduce(function(s,r){return s+sumCounts(r.counts||{});},0);
  var filterTag=hasFilter?'<span class="filter-tag">'+(f.from||'처음')+'~'+(f.to||'오늘')+' · '+recs.length+'건</span>':'';
  var tpls=showContent?(templates[activeSg]||[]):[];
  var isPinned=showContent&&pins.indexOf(activeSg)>=0;
  var goal=showContent?(goals[activeSg]||0):0;

  // 목표 인원 바
  var goalHtml='';
  if(showContent&&goal>0){
    var avgPeople=recs.length?Math.round(totalPeople/recs.length):0;
    var pct=Math.min(Math.round(avgPeople/goal*100),100);
    var isOver=avgPeople>goal;
    goalHtml='<div class="goal-bar-wrap">'
      +'<div class="goal-bar-top"><span class="goal-bar-label">목표 인원: '+goal+'명 | 평균: '+avgPeople+'명 <button class="btn-set-goal" data-cat="'+catId+'" data-sg="'+activeSg+'">수정</button></span>'
      +'<span class="goal-bar-pct">'+pct+'%</span></div>'
      +'<div class="goal-bar"><div class="goal-bar-fill'+(isOver?' over':'')+'" style="width:'+pct+'%"></div></div></div>';
  } else if(showContent){
    goalHtml='<div style="margin-bottom:.75rem"><button class="btn-set-goal" data-cat="'+catId+'" data-sg="'+activeSg+'">+ 목표 인원 설정</button></div>';
  }

  // 정기 템플릿
  var tplHtml='';
  if(showContent){
    var tplItems=tpls.map(function(t){
      var tplRecs=(records[activeSg]||[]).filter(function(r){return r.name===t.name;});var tst=accumStats(tplRecs);
      return '<div class="tpl-item">'
        +'<span class="tpl-name">'+esc(t.name)+'</span><span class="tpl-day">매주 '+DAYS[t.day]+'요일</span>'
        +'<div class="tpl-stats">'
        +'<div class="tpl-stat-chip tl"><div class="tpl-stat-label">총인원</div><div class="tpl-stat-val">'+tst.total+'</div></div>'
        +'<div class="tpl-stat-chip male"><div class="tpl-stat-label">남</div><div class="tpl-stat-val">'+tst.male+'</div></div>'
        +'<div class="tpl-stat-chip female"><div class="tpl-stat-label">여</div><div class="tpl-stat-val">'+tst.female+'</div></div>'
        +AGES.map(function(a){return '<div class="tpl-stat-chip"><div class="tpl-stat-label">'+a+'</div><div class="tpl-stat-val">'+tst[a]+'</div></div>';}).join('')
        +'<span style="font-size:10px;color:#aaa;margin-left:2px">'+tplRecs.length+'회</span></div>'
        +'<div class="tpl-btns">'
        +'<button class="btn-tpl-use" data-cat="'+catId+'" data-sg="'+activeSg+'" data-tpl="'+t.id+'">이번 주 입력</button>'
        +'<button class="btn-tpl-edit" data-cat="'+catId+'" data-sg="'+activeSg+'" data-tpl="'+t.id+'">✎</button>'
        +'<button class="btn-tpl-del" data-cat="'+catId+'" data-sg="'+activeSg+'" data-tpl="'+t.id+'">✕</button>'
        +'</div></div>';
    }).join('');
    tplHtml='<div class="template-section">'
      +'<div class="template-header"><span class="template-label">📋 정기 템플릿</span><button class="btn-add-tpl" data-cat="'+catId+'" data-sg="'+activeSg+'">+ 추가</button></div>'
      +(tpls.length?'<div class="tpl-list">'+tplItems+'</div>':'<div style="font-size:12px;color:#bbb;padding:4px 0">템플릿을 추가하면 매주 빠르게 입력할 수 있어요</div>')
      +'</div>';
  }

  var contentHtml='';
  if(!groups.length){contentHtml='<div class="no-sg"><i class="ti ti-folder-plus"></i>왼쪽에서 그룹을 먼저 추가해 주세요</div>';}
  else if(!showContent){contentHtml='<div class="no-sg"><i class="ti ti-hand-click"></i>왼쪽에서 그룹을 선택하세요</div>';}
  else{
    contentHtml='<div class="sg-header"><div class="sg-title">'+esc(g.name)+(isPinned?' <span style="font-size:13px">📌</span>':'')+'</div>'
      +'<div class="sg-header-btns">'
      +'<button class="btn-pinsg'+(isPinned?' pinned':'')+'" data-cat="'+catId+'" data-sg="'+activeSg+'" title="즐겨찾기"><i class="ti ti-'+(isPinned?'star-filled':'star')+'"></i></button>'
      +'<button class="btn-editsg" data-cat="'+catId+'" data-sg="'+activeSg+'"><i class="ti ti-pencil"></i> 이름 수정</button>'
      +'<button class="btn-delsg" data-cat="'+catId+'" data-sg="'+activeSg+'"><i class="ti ti-trash"></i> 그룹 삭제</button>'
      +'</div></div>'
      +goalHtml+tplHtml
      +'<div class="add-card"><div class="add-top-row">'
      +'<div class="field-g"><label>날짜</label><input type="date" id="add-date-'+catId+'" value="'+today()+'"></div>'
      +'<div class="field-g"><label>행사 / 모임명</label><input type="text" id="add-name-'+catId+'" placeholder="예) 5월 정기전"></div>'
      +'</div>'+countTableHtml('add-'+catId,{})
      +'<div class="field-g" style="margin-top:.6rem"><label>메모 (선택)</label><input type="text" id="add-memo-'+catId+'" placeholder="특이사항, 장소 등"></div>'
      +'<div class="add-btn-row"><button class="btn-add" data-cat="'+catId+'" data-sg="'+activeSg+'"><i class="ti ti-plus"></i> 추가</button></div></div>'
      +'<div class="filter-bar"><label>기간 필터</label>'
      +'<input type="date" class="filter-from" value="'+f.from+'"><span class="filter-sep">~</span>'
      +'<input type="date" class="filter-to" value="'+f.to+'">'+filterTag
      +(hasFilter?'<button class="btn-reset">초기화</button>':'')+'</div>'
      +(recs.length?'<div class="summary-row">'
        +'<div class="stat"><div class="stat-label">누적 인원'+(hasFilter?' (필터)':'')+'</div><div class="stat-val">'+totalPeople.toLocaleString()+'<span class="stat-unit"> 명</span></div></div>'
        +'<div class="stat"><div class="stat-label">기록 건수</div><div class="stat-val">'+recs.length+'<span class="stat-unit"> 건</span></div></div>'
        +'<div class="stat"><div class="stat-label">평균 인원</div><div class="stat-val">'+Math.round(totalPeople/(recs.length||1))+'<span class="stat-unit"> 명</span></div></div>'
        +'</div>':'')
      +'<div class="records-list">'
      +(sorted.length?sorted.map(function(r,idx){
        var c=r.counts||{},tot=sumCounts(c),mTot=maleTotal(c),fTot=femaleTotal(c);
        // 전주 대비 증감
        var changeHtml='';
        if(idx<sorted.length-1){var prev=sumCounts(sorted[idx+1].counts||{});var diff=tot-prev;if(diff>0)changeHtml='<span class="rec-change up">↑'+diff+'</span>';else if(diff<0)changeHtml='<span class="rec-change down">↓'+Math.abs(diff)+'</span>';}
        return '<div class="rec"><div class="rec-top">'
          +'<div class="rec-left"><div class="rec-date">'+r.date+'</div><div class="rec-name">'+esc(r.name)+changeHtml+'</div></div>'
          +'<div class="rec-btns"><div class="rec-total">'+tot+'<span class="rec-unit"> 명</span></div>'
          +'<button class="btn-copy-rec" data-cat="'+catId+'" data-sg="'+activeSg+'" data-rec="'+r.id+'" title="복사"><i class="ti ti-copy"></i></button>'
          +'<button class="btn-edit-rec" data-cat="'+catId+'" data-sg="'+activeSg+'" data-rec="'+r.id+'" title="수정"><i class="ti ti-pencil"></i></button>'
          +'<button class="btn-del" data-cat="'+catId+'" data-sg="'+activeSg+'" data-rec="'+r.id+'" title="삭제"><i class="ti ti-trash"></i></button>'
          +'</div></div>'
          +'<div class="rec-detail">'
          +'<div class="rdc t"><div class="rdc-label">총인원</div><div class="rdc-val">'+tot+'</div></div>'
          +'<div class="rdc m"><div class="rdc-label">남</div><div class="rdc-val">'+mTot+'</div></div>'
          +'<div class="rdc f"><div class="rdc-label">여</div><div class="rdc-val">'+fTot+'</div></div>'
          +AGES.map(function(a){return '<div class="rdc"><div class="rdc-label">'+a+'</div><div class="rdc-val">'+ageTotal(c,a)+'</div></div>';}).join('')
          +'</div>'
          +(r.memo?'<div class="rec-memo">📝 '+esc(r.memo)+'</div>':'')
          +'</div>';
      }).join(''):'<div class="empty"><i class="ti ti-calendar-off"></i>'+(hasFilter?'해당 기간에 기록이 없어요':'아직 기록이 없어요')+'</div>')
      +'</div>';
  }
  return dashboardHtml(catId)+'<div class="layout"><div class="sidebar">'+sidebarHtml+'<button class="btn-addsg"><i class="ti ti-plus" style="font-size:13px"></i>그룹 추가</button></div><div class="content">'+contentHtml+'</div></div>';
}

function switchCat(catId){curCat=catId;render();}
function selectSg(catId,sgId){curSg[catId]=sgId;renderPanels();}
function setFilter(catId,key,val){if(!filters[catId])filters[catId]={};filters[catId][key]=val;renderPanels();}
function resetFilter(catId){filters[catId]={from:'',to:''};renderPanels();}

function togglePin(catId,sgId){
  var pins=state.data[catId].pins=state.data[catId].pins||[];
  var idx=pins.indexOf(sgId);if(idx>=0)pins.splice(idx,1);else pins.push(sgId);
  persist();renderPanels();showToast(idx>=0?'즐겨찾기 해제':'즐겨찾기에 추가되었습니다');
}

function addRecord(catId,sgId){
  var date=document.getElementById('add-date-'+catId).value;
  var name=document.getElementById('add-name-'+catId).value.trim();
  var counts=getTableCounts('add-'+catId);
  var memo=document.getElementById('add-memo-'+catId)?.value.trim()||'';
  if(!name){showToast('행사/모임명을 입력해 주세요');return;}
  if(!date){showToast('날짜를 선택해 주세요');return;}
  if(sumCounts(counts)===0){showToast('인원 수를 입력해 주세요');return;}
  if(!state.data[catId].records[sgId])state.data[catId].records[sgId]=[];
  state.data[catId].records[sgId].push({id:Date.now()+'',date:date,name:name,counts:counts,memo:memo});
  persist();renderPanels();
  document.getElementById('add-name-'+catId).value='';
  if(document.getElementById('add-memo-'+catId))document.getElementById('add-memo-'+catId).value='';
  showToast('기록이 추가되었습니다');
}

function delRecord(catId,sgId,recId){if(!confirm('이 기록을 삭제할까요?'))return;state.data[catId].records[sgId]=state.data[catId].records[sgId].filter(function(r){return r.id!==recId;});persist();renderPanels();showToast('삭제되었습니다');}
function copyRecord(catId,sgId,recId){var rec=(state.data[catId].records[sgId]||[]).find(function(r){return r.id===recId;});if(!rec)return;var nr=JSON.parse(JSON.stringify(rec));nr.id=Date.now()+'';nr.date=today();state.data[catId].records[sgId].push(nr);persist();renderPanels();showToast('복사되었습니다');}

function openSetGoal(catId,sgId){
  modalMode='set-goal';modalCat=catId;modalDelTarget=sgId;
  var cur=state.data[catId].goals?.[sgId]||0;
  document.getElementById('modal-title').textContent='목표 인원 설정';
  document.getElementById('modal-desc').textContent='이 그룹의 회당 목표 인원을 설정하세요.';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><label>목표 인원 (명)</label><input id="goal-val" type="number" min="0" value="'+cur+'" placeholder="예) 50"></div>';
  document.getElementById('modal-confirm').textContent='저장';document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var i=document.getElementById('goal-val');if(i){i.focus();i.select();}},50);
}

function openAddTpl(catId,sgId){
  modalMode='add-tpl';modalCat=catId;modalDelTarget=sgId;
  document.getElementById('modal-title').textContent='정기 템플릿 추가';
  document.getElementById('modal-desc').textContent='매주 반복되는 강좌/행사를 저장하세요.';
  document.getElementById('modal-fields').innerHTML=
    '<div class="modal-field"><label>강좌/행사명</label><input id="tpl-name" type="text" placeholder="예) 수요 요가 강좌"></div>'
    +'<div class="modal-field"><label>매주 요일</label><select id="tpl-day">'+DAYS.map(function(d,i){return '<option value="'+i+'">'+d+'요일</option>';}).join('')+'</select></div>';
  document.getElementById('modal-confirm').textContent='저장';document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){document.getElementById('tpl-name').focus();},50);
}

function openEditTpl(catId,sgId,tplId){
  var tpls=state.data[catId].templates[sgId]||[];var tpl=tpls.find(function(t){return t.id===tplId;});if(!tpl)return;
  modalMode='edit-tpl';modalCat=catId;modalDelTarget=sgId;modalRecTarget=tplId;
  document.getElementById('modal-title').textContent='템플릿 수정';document.getElementById('modal-desc').textContent='';
  document.getElementById('modal-fields').innerHTML=
    '<div class="modal-field"><label>강좌/행사명</label><input id="tpl-edit-name" type="text" value="'+esc(tpl.name)+'"></div>'
    +'<div class="modal-field"><label>매주 요일</label><select id="tpl-edit-day">'+DAYS.map(function(d,i){return '<option value="'+i+'"'+(tpl.day===i?' selected':'')+'>'+d+'요일</option>';}).join('')+'</select></div>';
  document.getElementById('modal-confirm').textContent='수정';document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var i=document.getElementById('tpl-edit-name');if(i){i.focus();i.select();}},50);
}

function useTpl(catId,sgId,tplId){
  var tpls=state.data[catId].templates[sgId]||[];var tpl=tpls.find(function(t){return t.id===tplId;});if(!tpl)return;
  modalMode='use-tpl';modalCat=catId;modalDelTarget=sgId;modalRecTarget=tplId;
  document.getElementById('modal-title').textContent='"'+tpl.name+'" 이번 주 입력';
  document.getElementById('modal-desc').textContent='인원을 입력하면 기록이 추가됩니다.';
  document.getElementById('modal-fields').innerHTML=
    '<div class="modal-field"><label>날짜</label><input id="tpl-date" type="date" value="'+today()+'"></div>'
    +countTableHtml('tpl-inp',{},'modal-count-table')
    +'<div class="modal-field"><label>메모 (선택)</label><input id="tpl-memo" type="text" placeholder="특이사항 등"></div>';
  document.getElementById('modal-confirm').textContent='추가';document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){updateTotals('tpl-inp');},50);
}

function delTpl(catId,sgId,tplId){if(!confirm('이 템플릿을 삭제할까요?'))return;state.data[catId].templates[sgId]=(state.data[catId].templates[sgId]||[]).filter(function(t){return t.id!==tplId;});persist();renderPanels();showToast('템플릿이 삭제되었습니다');}

function openEditRec(catId,sgId,recId){
  var rec=(state.data[catId].records[sgId]||[]).find(function(r){return r.id===recId;});if(!rec)return;
  modalMode='edit-rec';modalCat=catId;modalDelTarget=sgId;modalRecTarget=recId;
  document.getElementById('modal-title').textContent='기록 수정';document.getElementById('modal-desc').textContent='';
  document.getElementById('modal-fields').innerHTML=
    '<div class="modal-field"><label>날짜</label><input id="er-date" type="date" value="'+rec.date+'"></div>'
    +'<div class="modal-field"><label>행사 / 모임명</label><input id="er-name" type="text" value="'+esc(rec.name)+'"></div>'
    +countTableHtml('er-inp',rec.counts||{},'modal-count-table')
    +'<div class="modal-field"><label>메모</label><input id="er-memo" type="text" value="'+(rec.memo||'')+'" placeholder="특이사항 등"></div>';
  document.getElementById('modal-confirm').textContent='수정 완료';document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){updateTotals('er-inp');document.getElementById('er-name').focus();},50);
}

function openEdit(type,catId,sgId){
  modalMode='edit-'+type;modalCat=catId;modalDelTarget=sgId||null;
  var name='';
  if(type==='cat'){var cat=state.cats.find(function(c){return c.id===catId;});name=cat?cat.name:'';}
  else{var grp=state.data[catId].groups.find(function(g){return g.id===sgId;});name=grp?grp.name:'';}
  var label=type==='cat'?'카테고리':'그룹';
  document.getElementById('modal-title').textContent=label+' 이름 수정';document.getElementById('modal-desc').textContent='';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><input id="modal-input" type="text" maxlength="30" value="'+esc(name)+'"></div>';
  document.getElementById('modal-confirm').textContent='수정';document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var i=document.getElementById('modal-input');if(i){i.focus();i.select();}},50);
}

function openDel(type,catId,sgId){
  modalMode='del-'+type;modalCat=catId;modalDelTarget=sgId||null;
  var name='',cnt=0;
  if(type==='cat'){var cat=state.cats.find(function(c){return c.id===catId;});name=cat?cat.name:'';cnt=Object.values(state.data[catId].records||{}).reduce(function(s,a){return s+a.length;},0);}
  else{var grp=state.data[catId].groups.find(function(g){return g.id===sgId;});name=grp?grp.name:'';cnt=(state.data[catId].records[sgId]||[]).length;}
  var label=type==='cat'?'카테고리':'그룹';
  document.getElementById('modal-title').textContent=label+' 삭제';
  document.getElementById('modal-desc').innerHTML='<strong>"'+esc(name)+'"</strong> '+label+(cnt>0?'와 모든 기록 <strong>'+cnt+'건</strong>':'')+'을 삭제하려면<br>'+label+' 이름을 정확히 입력하세요.';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><input id="modal-input" type="text" maxlength="30" placeholder="'+esc(name)+'"></div>';
  document.getElementById('modal-confirm').textContent='삭제';document.getElementById('modal-confirm').className='btn-confirm danger';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var i=document.getElementById('modal-input');if(i)i.focus();},50);
}

function openModal(mode,catId){
  modalMode=mode;modalCat=catId||null;
  document.getElementById('modal-title').textContent=mode==='cat'?'카테고리 추가':'그룹 추가';
  document.getElementById('modal-desc').textContent='';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><input id="modal-input" type="text" maxlength="30" placeholder="'+(mode==='cat'?'예) 봉사활동':'예) 농구동아리')+'"></div>';
  document.getElementById('modal-confirm').textContent='추가';document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var i=document.getElementById('modal-input');if(i)i.focus();},50);
}

function closeModal(){document.getElementById('modal').style.display='none';}

function confirmModal(){
  if(modalMode==='set-goal'){
    var val=parseInt(document.getElementById('goal-val').value)||0;
    if(!state.data[modalCat].goals)state.data[modalCat].goals={};
    state.data[modalCat].goals[modalDelTarget]=val;
    persist();closeModal();renderPanels();showToast('목표 인원이 설정되었습니다');return;
  }
  if(modalMode==='edit-rec'){
    var date=document.getElementById('er-date').value;var name=document.getElementById('er-name').value.trim();
    var counts=getTableCounts('er-inp');var memo=document.getElementById('er-memo')?.value.trim()||'';
    if(!name){showToast('행사/모임명을 입력해 주세요');return;}if(!date){showToast('날짜를 선택해 주세요');return;}
    var rec=(state.data[modalCat].records[modalDelTarget]||[]).find(function(r){return r.id===modalRecTarget;});
    if(rec){rec.date=date;rec.name=name;rec.counts=counts;rec.memo=memo;}
    persist();closeModal();renderPanels();showToast('기록이 수정되었습니다');return;
  }
  if(modalMode==='add-tpl'){
    var n=document.getElementById('tpl-name').value.trim();var day=parseInt(document.getElementById('tpl-day').value);
    if(!n){showToast('강좌명을 입력해 주세요');return;}
    if(!state.data[modalCat].templates[modalDelTarget])state.data[modalCat].templates[modalDelTarget]=[];
    state.data[modalCat].templates[modalDelTarget].push({id:Date.now()+'',name:n,day:day});
    persist();closeModal();renderPanels();showToast('"'+n+'" 템플릿이 추가되었습니다');return;
  }
  if(modalMode==='edit-tpl'){
    var n2=document.getElementById('tpl-edit-name').value.trim();var day2=parseInt(document.getElementById('tpl-edit-day').value);
    if(!n2){showToast('강좌명을 입력해 주세요');return;}
    var tpl=(state.data[modalCat].templates[modalDelTarget]||[]).find(function(t){return t.id===modalRecTarget;});
    if(tpl){tpl.name=n2;tpl.day=day2;}
    persist();closeModal();renderPanels();showToast('템플릿이 수정되었습니다');return;
  }
  if(modalMode==='use-tpl'){
    var tpl2=(state.data[modalCat].templates[modalDelTarget]||[]).find(function(t){return t.id===modalRecTarget;});if(!tpl2)return;
    var date2=document.getElementById('tpl-date').value;var counts2=getTableCounts('tpl-inp');var memo2=document.getElementById('tpl-memo')?.value.trim()||'';
    if(!date2){showToast('날짜를 선택해 주세요');return;}if(sumCounts(counts2)===0){showToast('인원 수를 입력해 주세요');return;}
    if(!state.data[modalCat].records[modalDelTarget])state.data[modalCat].records[modalDelTarget]=[];
    state.data[modalCat].records[modalDelTarget].push({id:Date.now()+'',date:date2,name:tpl2.name,counts:counts2,memo:memo2});
    persist();closeModal();renderPanels();showToast('기록이 추가되었습니다');return;
  }
  if(modalMode==='edit-cat'||modalMode==='edit-sg'){
    var inp=document.getElementById('modal-input');var val2=inp?inp.value.trim():'';
    if(!val2){showToast('이름을 입력해 주세요');return;}
    if(modalMode==='edit-cat'){var cat=state.cats.find(function(c){return c.id===modalCat;});if(cat)cat.name=val2;}
    else{var grp=state.data[modalCat].groups.find(function(g){return g.id===modalDelTarget;});if(grp)grp.name=val2;}
    persist();closeModal();render();showToast('이름이 수정되었습니다');return;
  }
  if(modalMode==='del-cat'||modalMode==='del-sg'){
    var inp2=document.getElementById('modal-input');var val3=inp2?inp2.value.trim():'';
    var isCat=modalMode==='del-cat';
    var tn=isCat?(state.cats.find(function(c){return c.id===modalCat;})||{}).name:(state.data[modalCat].groups.find(function(g){return g.id===modalDelTarget;})||{}).name;
    if(val3!==tn){if(inp2){inp2.className='error';inp2.classList.remove('shake');void inp2.offsetWidth;inp2.classList.add('shake');}showToast('이름이 일치하지 않아요');return;}
    closeModal();
    if(isCat){state.cats=state.cats.filter(function(c){return c.id!==modalCat;});delete state.data[modalCat];delete curSg[modalCat];delete filters[modalCat];delete dashSg[modalCat];delete dashFrom[modalCat];delete dashTo[modalCat];if(curCat===modalCat)curCat='overview';persist();render();showToast('카테고리가 삭제되었습니다');}
    else{state.data[modalCat].groups=state.data[modalCat].groups.filter(function(g){return g.id!==modalDelTarget;});delete state.data[modalCat].records[modalDelTarget];curSg[modalCat]=state.data[modalCat].groups.length?state.data[modalCat].groups[0].id:null;persist();renderPanels();showToast('그룹이 삭제되었습니다');}
    return;
  }
  var inp3=document.getElementById('modal-input');var val4=inp3?inp3.value.trim():'';
  if(!val4){showToast('이름을 입력해 주세요');return;}
  if(modalMode==='cat'){var id='cat-'+Date.now();state.cats.push({id:id,name:val4});state.data[id]={groups:[],records:{},templates:{},goals:{},pins:[]};filters[id]={from:'',to:''};dashSg[id]='all';dashFrom[id]='';dashTo[id]='';curCat=id;persist();closeModal();render();showToast('"'+val4+'" 카테고리가 추가되었습니다');}
  else{var id2='sg-'+Date.now();state.data[modalCat].groups.push({id:id2,name:val4});state.data[modalCat].records[id2]=[];if(!state.data[modalCat].templates)state.data[modalCat].templates={};state.data[modalCat].templates[id2]=[];if(!state.data[modalCat].goals)state.data[modalCat].goals={};curSg[modalCat]=id2;persist();closeModal();renderPanels();showToast('"'+val4+'" 그룹이 추가되었습니다');}
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

var searchTimer=null;
document.getElementById('global-search').addEventListener('input',function(){clearTimeout(searchTimer);var q=this.value.trim();searchTimer=setTimeout(function(){doSearch(q);},200);});
document.getElementById('search-clear').addEventListener('click',function(){document.getElementById('global-search').value='';document.getElementById('search-results').style.display='none';this.style.display='none';});
document.getElementById('btn-addtab').addEventListener('click',function(){openModal('cat');});
document.getElementById('modal-cancel').addEventListener('click',closeModal);
document.getElementById('modal-confirm').addEventListener('click',confirmModal);
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

loadFromSheet();
</script>
