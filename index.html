<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>headcount-log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:760px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1.5rem}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:#1D9E75;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.h-title{font-size:20px;font-weight:600;color:#111}
.h-sub{font-size:12px;color:#888;margin-top:2px}
.sync-status{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.sync-status.ok{background:#E1F5EE;color:#0F6E56}
.sync-status.loading{background:#fff3cd;color:#856404}
.sync-status.error{background:#fde8e8;color:#a32d2d}
.tabs-wrap{display:flex;align-items:center;border-bottom:1px solid #e0e0d8;margin-bottom:1.25rem}
.tabs-scroll{display:flex;align-items:flex-end;flex:1;overflow-x:auto;scrollbar-width:none}
.tabs-scroll::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.active{color:#0F6E56;border-bottom-color:#1D9E75}
.tab:hover:not(.active){color:#333}
.tab-name{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cnt{font-size:11px;background:#eee;color:#666;border-radius:10px;padding:1px 6px;font-weight:400}
.tab.active .cnt{background:#E1F5EE;color:#0F6E56}
.tab-edit{font-size:11px;color:#ccc;padding:1px 3px;border-radius:3px;cursor:pointer;line-height:1;background:none;border:none;margin-left:1px}
.tab-edit:hover{color:#0F6E56}
.tab-del{font-size:12px;color:#ccc;padding:1px 3px;border-radius:3px;cursor:pointer;line-height:1;background:none;border:none;margin-left:1px}
.tab-del:hover{color:#c0392b}
.btn-addtab{display:flex;align-items:center;gap:4px;padding:7px 12px;border:none;background:none;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:color .15s}
.btn-addtab:hover{color:#0F6E56}
.panel{display:none}.panel.active{display:block}
.layout{display:grid;grid-template-columns:175px 1fr;gap:12px;min-height:280px}
.sidebar{display:flex;flex-direction:column;gap:4px}
.sg-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#666;border:1px solid transparent;transition:all .15s;gap:4px}
.sg-item:hover{background:#f0f0ea;color:#333}
.sg-item.active{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB;font-weight:500}
.sg-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sg-cnt{font-size:11px;opacity:.7;flex-shrink:0}
.sg-edit{font-size:11px;color:#ccc;padding:1px 3px;border-radius:3px;cursor:pointer;background:none;border:none;flex-shrink:0;opacity:0;transition:opacity .15s}
.sg-item:hover .sg-edit,.sg-item.active .sg-edit{opacity:1}
.sg-edit:hover{color:#0F6E56}
.btn-addsg{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:8px;border:1px dashed #ccc;background:none;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;transition:all .15s;width:100%}
.btn-addsg:hover{border-color:#1D9E75;color:#0F6E56}
.add-card{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:.9rem 1rem;margin-bottom:.75rem}
.add-row{display:grid;grid-template-columns:115px 1fr 76px auto;gap:7px;align-items:end}
.field-g label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px}
.field-g input{width:100%;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit;outline:none;transition:border-color .15s}
.field-g input:focus{border-color:#1D9E75}
.btn-add{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:6px;background:#1D9E75;color:#fff;border:none;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;height:32px;margin-top:15px;transition:background .15s}
.btn-add:hover{background:#0F6E56}
.sg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.sg-title{font-size:15px;font-weight:600;color:#111}
.sg-header-btns{display:flex;align-items:center;gap:4px}
.btn-editsg{background:none;border:none;cursor:pointer;font-size:12px;color:#aaa;padding:3px 6px;border-radius:4px;transition:color .15s}
.btn-editsg:hover{color:#0F6E56}
.btn-delsg{background:none;border:none;cursor:pointer;font-size:12px;color:#bbb;padding:3px 6px;border-radius:4px;transition:color .15s}
.btn-delsg:hover{color:#c0392b}
.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:.75rem;background:#f0f0ea;border-radius:8px;padding:8px 10px;flex-wrap:wrap}
.filter-bar label{font-size:11px;font-weight:600;color:#666;white-space:nowrap}
.filter-bar input[type=date]{font-size:12px;padding:4px 7px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit}
.filter-bar input[type=date]:focus{outline:none;border-color:#1D9E75}
.filter-sep{font-size:12px;color:#aaa}
.btn-reset{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;margin-left:auto}
.filter-tag{font-size:11px;color:#0F6E56;background:#E1F5EE;border-radius:4px;padding:2px 7px;white-space:nowrap}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:.75rem}
.stat{background:#f0f0ea;border-radius:8px;padding:.6rem .8rem}
.stat-label{font-size:10px;color:#777;margin-bottom:2px}
.stat-val{font-size:18px;font-weight:600;color:#111}
.stat-unit{font-size:11px;font-weight:400;color:#888}
.records-list{display:flex;flex-direction:column;gap:5px}
.rec{background:#fff;border:1px solid #e8e8e0;border-radius:8px;padding:.65rem .9rem;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:border-color .15s}
.rec:hover{border-color:#bbb}
.rec-date{font-size:11px;color:#aaa;flex-shrink:0;width:76px}
.rec-name{font-size:13px;color:#111;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.rec-count{font-size:15px;font-weight:600;color:#0F6E56;flex-shrink:0}
.rec-unit{font-size:11px;color:#bbb}
.rec-btns{display:flex;align-items:center;gap:4px;flex-shrink:0}
.btn-edit-rec{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:2px 4px;border-radius:4px;transition:color .15s;opacity:0}
.rec:hover .btn-edit-rec{opacity:1}
.btn-edit-rec:hover{color:#0F6E56}
.btn-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:2px 4px;border-radius:4px;transition:color .15s;opacity:0}
.rec:hover .btn-del{opacity:1}
.btn-del:hover{color:#c0392b}
.empty{text-align:center;padding:2rem .5rem;color:#bbb;font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:.5rem;opacity:.4}
.no-sg{text-align:center;padding:3rem 1rem;color:#bbb;font-size:13px}
.no-sg i{font-size:32px;display:block;margin-bottom:.6rem;opacity:.3}
.no-cat{text-align:center;padding:4rem 1rem;color:#bbb;font-size:13px}
.no-cat i{font-size:36px;display:block;margin-bottom:.75rem;opacity:.3}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;border:1px solid #e8e8e0;width:340px;padding:1.25rem}
.modal h3{font-size:15px;font-weight:600;margin-bottom:.75rem;color:#111}
.modal-desc{font-size:12px;color:#888;margin-bottom:1rem;line-height:1.6}
.modal-desc strong{color:#c0392b;font-weight:600}
.modal-field{margin-bottom:.75rem}
.modal-field label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px}
.modal-field input{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit;outline:none;transition:border-color .15s}
.modal-field input:focus{border-color:#1D9E75}
.modal-field input.error{border-color:#c0392b;background:#fff8f8}
.modal-btns{display:flex;justify-content:flex-end;gap:6px;margin-top:.25rem}
.btn-cancel{padding:7px 14px;border-radius:6px;background:none;border:1px solid #ddd;font-size:13px;cursor:pointer;color:#444}
.btn-confirm{padding:7px 14px;border-radius:6px;background:#1D9E75;color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-confirm:hover{background:#0F6E56}
.btn-confirm.danger{background:#c0392b}
.btn-confirm.danger:hover{background:#a93226}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .3s ease}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:540px){.layout{grid-template-columns:1fr}.add-row{grid-template-columns:1fr 1fr}.btn-add{grid-column:span 2}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-left">
      <div class="logo"><i class="ti ti-users"></i></div>
      <div>
        <div class="h-title">headcount-log</div>
        <div class="h-sub">카테고리 → 그룹 → 날짜별 인원 기록</div>
      </div>
    </div>
    <div id="sync-status" class="sync-status loading">⏳ 불러오는 중...</div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs-scroll" id="tabs-scroll"></div>
    <button class="btn-addtab" id="btn-addtab"><i class="ti ti-plus" style="font-size:13px"></i> 카테고리 추가</button>
  </div>
  <div id="panels"></div>
</div>

<!-- 공용 모달 -->
<div id="modal" style="display:none" class="modal-bg">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="modal-desc" id="modal-desc"></div>
    <div id="modal-fields"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">취소</button>
      <button class="btn-confirm" id="modal-confirm">확인</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbzI2VU4Av7gI-hGdRluYj_KnXX6aG6muKmppOIIdQTTuNgjTBegyEVrNyw24CFsXphrjQ/exec';
var state={cats:[],data:{}};
var curCat='',curSg={},filters={};
var modalMode=null,modalCat=null,modalDelTarget=null,modalRecTarget=null;
var DEFAULT_CATS=[{id:'biz',name:'사업'},{id:'club',name:'동아리'},{id:'reg',name:'정기형'}];

function setStatus(t,m){var el=document.getElementById('sync-status');el.className='sync-status '+t;el.textContent=m;}
function stateToRows(){return[[JSON.stringify(state)]];}
function rowsToState(rows){if(!rows||!rows.length||!rows[0][0])return null;try{return JSON.parse(rows[0][0]);}catch(e){return null;}}

function loadFromSheet(){
  setStatus('loading','⏳ 불러오는 중...');
  fetch(API_URL+'?action=load').then(function(r){return r.json();}).then(function(res){
    if(res.ok&&res.data){var p=rowsToState(res.data);if(p&&p.cats&&p.cats.length)state=p;else initDefault();}
    else initDefault();
    afterLoad();setStatus('ok','✅ 동기화됨');
  }).catch(function(){initDefault();afterLoad();setStatus('error','⚠️ 오프라인 모드');});
}

function saveToSheet(){
  setStatus('loading','💾 저장 중...');
  fetch(API_URL+'?action=save&payload='+encodeURIComponent(JSON.stringify(stateToRows())))
    .then(function(r){return r.json();}).then(function(res){setStatus(res.ok?'ok':'error',res.ok?'✅ 저장됨':'⚠️ 저장 실패');})
    .catch(function(){setStatus('error','⚠️ 저장 실패');});
}

function initDefault(){state={cats:DEFAULT_CATS.slice(),data:{}};state.cats.forEach(function(c){state.data[c.id]={groups:[],records:{}};});}
function afterLoad(){
  state.cats.forEach(function(c){
    if(!state.data[c.id])state.data[c.id]={groups:[],records:{}};
    if(!curSg[c.id]&&state.data[c.id].groups.length)curSg[c.id]=state.data[c.id].groups[0].id;
    if(!filters[c.id])filters[c.id]={from:'',to:''};
  });
  if(!curCat||!state.cats.find(function(c){return c.id===curCat;}))curCat=state.cats.length?state.cats[0].id:'';
  render();
}
function persist(){saveToSheet();}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function totalRec(catId){return state.data[catId]&&state.data[catId].groups?state.data[catId].groups.length:0;}
function applyFilter(recs,catId){var f=filters[catId]||{};return recs.filter(function(r){if(f.from&&r.date<f.from)return false;if(f.to&&r.date>f.to)return false;return true;});}

function render(){renderTabs();renderPanels();}

function renderTabs(){
  document.getElementById('tabs-scroll').innerHTML=state.cats.map(function(c){
    return '<button class="tab'+(curCat===c.id?' active':'')+'" data-cat="'+c.id+'">'
      +'<span class="tab-name">'+esc(c.name)+'</span><span class="cnt">'+totalRec(c.id)+'</span>'
      +'<span class="tab-edit" data-edit="'+c.id+'" title="수정">✎</span>'
      +'<span class="tab-del" data-del="'+c.id+'" title="삭제">×</span>'
      +'</button>';
  }).join('');
  document.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click',function(e){
      if(e.target.classList.contains('tab-del')||e.target.classList.contains('tab-edit'))return;
      switchCat(btn.getAttribute('data-cat'));
    });
  });
  document.querySelectorAll('.tab-edit').forEach(function(s){s.addEventListener('click',function(e){e.stopPropagation();openEdit('cat',s.getAttribute('data-edit'));});});
  document.querySelectorAll('.tab-del').forEach(function(s){s.addEventListener('click',function(e){e.stopPropagation();openDel('cat',s.getAttribute('data-del'));});});
}

function renderPanels(){
  if(!state.cats.length){document.getElementById('panels').innerHTML='<div class="no-cat"><i class="ti ti-layout-grid-add"></i>위의 "+ 카테고리 추가" 버튼으로 카테고리를 만들어 보세요</div>';return;}
  document.getElementById('panels').innerHTML=state.cats.map(function(c){
    return '<div id="panel-'+c.id+'" class="panel'+(curCat===c.id?' active':'')+'">'+buildPanel(c.id)+'</div>';
  }).join('');
  state.cats.forEach(function(c){
    var panel=document.getElementById('panel-'+c.id);if(!panel)return;
    panel.querySelectorAll('.sg-item').forEach(function(el){
      el.addEventListener('click',function(e){if(e.target.classList.contains('sg-edit'))return;selectSg(el.getAttribute('data-cat'),el.getAttribute('data-sg'));});
    });
    panel.querySelectorAll('.sg-edit').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();openEdit('sg',b.getAttribute('data-cat'),b.getAttribute('data-sg'));});});
    var as=panel.querySelector('.btn-addsg');if(as)as.addEventListener('click',function(){openModal('sg',c.id);});
    var es=panel.querySelector('.btn-editsg');if(es)es.addEventListener('click',function(){openEdit('sg',es.getAttribute('data-cat'),es.getAttribute('data-sg'));});
    var ds=panel.querySelector('.btn-delsg');if(ds)ds.addEventListener('click',function(){openDel('sg',ds.getAttribute('data-cat'),ds.getAttribute('data-sg'));});
    var ar=panel.querySelector('.btn-add');if(ar)ar.addEventListener('click',function(){addRecord(ar.getAttribute('data-cat'),ar.getAttribute('data-sg'));});
    panel.querySelectorAll('.btn-edit-rec').forEach(function(b){b.addEventListener('click',function(){openEditRec(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-rec'));});});
    panel.querySelectorAll('.btn-del').forEach(function(b){b.addEventListener('click',function(){delRecord(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-rec'));});});
    var fi=panel.querySelector('.filter-from'),ti=panel.querySelector('.filter-to');
    if(fi)fi.addEventListener('change',function(){setFilter(c.id,'from',fi.value);});
    if(ti)ti.addEventListener('change',function(){setFilter(c.id,'to',ti.value);});
    var rb=panel.querySelector('.btn-reset');if(rb)rb.addEventListener('click',function(){resetFilter(c.id);});
  });
}

function buildPanel(catId){
  var d=state.data[catId]||{groups:[],records:{}};
  var groups=d.groups,records=d.records,activeSg=curSg[catId];
  var f=filters[catId]||{from:'',to:''},hasFilter=f.from||f.to;
  var sidebarHtml=groups.map(function(g){
    var cnt=applyFilter(records[g.id]||[],catId).length;
    return '<div class="sg-item'+(activeSg===g.id?' active':'')+'" data-cat="'+catId+'" data-sg="'+g.id+'">'
      +'<span class="sg-name">'+esc(g.name)+'</span><span class="sg-cnt">'+cnt+'</span>'
      +'<button class="sg-edit" data-cat="'+catId+'" data-sg="'+g.id+'" title="수정">✎</button>'
      +'</div>';
  }).join('');
  var contentHtml='';
  if(!groups.length){contentHtml='<div class="no-sg"><i class="ti ti-folder-plus"></i>왼쪽에서 그룹을 먼저 추가해 주세요</div>';}
  else if(!activeSg||!groups.find(function(g){return g.id===activeSg;})){contentHtml='<div class="no-sg"><i class="ti ti-hand-click"></i>왼쪽에서 그룹을 선택하세요</div>';}
  else{
    var g=groups.find(function(g){return g.id===activeSg;});
    var recs=applyFilter(records[activeSg]||[],catId);
    var total=recs.reduce(function(s,r){return s+Number(r.count||0);},0);
    var avg=recs.length?Math.round(total/recs.length):0;
    var max=recs.length?Math.max.apply(null,recs.map(function(r){return Number(r.count||0);})):0;
    var sorted=recs.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
    var filterTag=hasFilter?'<span class="filter-tag">'+(f.from||'처음')+'~'+(f.to||'오늘')+' · '+recs.length+'건</span>':'';
    contentHtml='<div class="sg-header"><div class="sg-title">'+esc(g.name)+'</div>'
      +'<div class="sg-header-btns">'
      +'<button class="btn-editsg" data-cat="'+catId+'" data-sg="'+activeSg+'"><i class="ti ti-pencil"></i> 이름 수정</button>'
      +'<button class="btn-delsg" data-cat="'+catId+'" data-sg="'+activeSg+'"><i class="ti ti-trash"></i> 그룹 삭제</button>'
      +'</div></div>'
      +'<div class="add-card"><div class="add-row">'
      +'<div class="field-g"><label>날짜</label><input type="date" id="d-'+catId+'" value="'+today()+'"></div>'
      +'<div class="field-g"><label>행사 / 모임명</label><input type="text" id="n-'+catId+'" placeholder="예) 5월 정기전"></div>'
      +'<div class="field-g"><label>인원 수</label><input type="number" id="c-'+catId+'" placeholder="0" min="0" style="text-align:center"></div>'
      +'<button class="btn-add" data-cat="'+catId+'" data-sg="'+activeSg+'"><i class="ti ti-plus"></i>추가</button>'
      +'</div></div>'
      +'<div class="filter-bar"><label>기간 필터</label>'
      +'<input type="date" class="filter-from" value="'+f.from+'"><span class="filter-sep">~</span>'
      +'<input type="date" class="filter-to" value="'+f.to+'">'+filterTag
      +(hasFilter?'<button class="btn-reset">초기화</button>':'')+'</div>'
      +(recs.length?'<div class="summary-row">'
        +'<div class="stat"><div class="stat-label">누적 인원'+(hasFilter?' (필터)':'')+'</div><div class="stat-val">'+total.toLocaleString()+'<span class="stat-unit"> 명</span></div></div>'
        +'<div class="stat"><div class="stat-label">평균 인원</div><div class="stat-val">'+avg+'<span class="stat-unit"> 명</span></div></div>'
        +'<div class="stat"><div class="stat-label">최대 인원</div><div class="stat-val">'+max+'<span class="stat-unit"> 명</span></div></div>'
        +'</div>':'')
      +'<div class="records-list">'
      +(sorted.length?sorted.map(function(r){
        return '<div class="rec">'
          +'<div class="rec-date">'+r.date+'</div>'
          +'<div class="rec-name">'+esc(r.name)+'</div>'
          +'<div class="rec-btns">'
          +'<div class="rec-count">'+Number(r.count).toLocaleString()+'<span class="rec-unit"> 명</span></div>'
          +'<button class="btn-edit-rec" data-cat="'+catId+'" data-sg="'+activeSg+'" data-rec="'+r.id+'" title="수정"><i class="ti ti-pencil"></i></button>'
          +'<button class="btn-del" data-cat="'+catId+'" data-sg="'+activeSg+'" data-rec="'+r.id+'" title="삭제"><i class="ti ti-trash"></i></button>'
          +'</div></div>';
      }).join(''):'<div class="empty"><i class="ti ti-calendar-off"></i>'+(hasFilter?'해당 기간에 기록이 없어요':'아직 기록이 없어요')+'</div>')
      +'</div>';
  }
  return '<div class="layout"><div class="sidebar">'+sidebarHtml
    +'<button class="btn-addsg"><i class="ti ti-plus" style="font-size:13px"></i>그룹 추가</button>'
    +'</div><div class="content">'+contentHtml+'</div></div>';
}

function switchCat(catId){curCat=catId;render();}
function selectSg(catId,sgId){curSg[catId]=sgId;renderPanels();}
function setFilter(catId,key,val){if(!filters[catId])filters[catId]={};filters[catId][key]=val;renderPanels();}
function resetFilter(catId){filters[catId]={from:'',to:''};renderPanels();}

function addRecord(catId,sgId){
  var date=document.getElementById('d-'+catId).value;
  var name=document.getElementById('n-'+catId).value.trim();
  var count=parseInt(document.getElementById('c-'+catId).value)||0;
  if(!name){showToast('행사/모임명을 입력해 주세요');return;}
  if(!date){showToast('날짜를 선택해 주세요');return;}
  if(count<=0){showToast('인원 수를 입력해 주세요');return;}
  if(!state.data[catId].records[sgId])state.data[catId].records[sgId]=[];
  state.data[catId].records[sgId].push({id:Date.now()+'',date:date,name:name,count:count});
  persist();renderPanels();
  document.getElementById('n-'+catId).value='';document.getElementById('c-'+catId).value='';
  showToast('기록이 추가되었습니다');
}

function delRecord(catId,sgId,recId){
  if(!confirm('이 기록을 삭제할까요?'))return;
  state.data[catId].records[sgId]=state.data[catId].records[sgId].filter(function(r){return r.id!==recId;});
  persist();renderPanels();showToast('삭제되었습니다');
}

// 기록 수정 모달
function openEditRec(catId,sgId,recId){
  var rec=(state.data[catId].records[sgId]||[]).find(function(r){return r.id===recId;});
  if(!rec)return;
  modalMode='edit-rec';modalCat=catId;modalDelTarget=sgId;modalRecTarget=recId;
  document.getElementById('modal-title').textContent='기록 수정';
  document.getElementById('modal-desc').textContent='';
  document.getElementById('modal-fields').innerHTML=
    '<div class="modal-field"><label>날짜</label><input type="date" id="er-date" value="'+rec.date+'"></div>'
    +'<div class="modal-field"><label>행사 / 모임명</label><input type="text" id="er-name" value="'+esc(rec.name)+'" placeholder="행사/모임명"></div>'
    +'<div class="modal-field"><label>인원 수</label><input type="number" id="er-count" value="'+rec.count+'" min="0" style="text-align:center"></div>';
  document.getElementById('modal-confirm').textContent='수정 완료';
  document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){document.getElementById('er-name').focus();},50);
}

// 이름 수정 모달
function openEdit(type,catId,sgId){
  modalMode='edit-'+type;modalCat=catId;modalDelTarget=sgId||null;
  var currentName='';
  if(type==='cat'){var cat=state.cats.find(function(c){return c.id===catId;});currentName=cat?cat.name:'';}
  else{var grp=state.data[catId].groups.find(function(g){return g.id===sgId;});currentName=grp?grp.name:'';}
  var label=type==='cat'?'카테고리':'그룹';
  document.getElementById('modal-title').textContent=label+' 이름 수정';
  document.getElementById('modal-desc').textContent='';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><input id="modal-input" type="text" maxlength="30" value="'+esc(currentName)+'" placeholder="'+esc(currentName)+'"></div>';
  document.getElementById('modal-confirm').textContent='수정';
  document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var inp=document.getElementById('modal-input');if(inp){inp.focus();inp.select();}},50);
}

// 삭제 모달
function openDel(type,catId,sgId){
  modalMode='del-'+type;modalCat=catId;modalDelTarget=sgId||null;
  var targetName='',recCount=0;
  if(type==='cat'){var cat=state.cats.find(function(c){return c.id===catId;});targetName=cat?cat.name:'';recCount=totalRec(catId);}
  else{var grp=state.data[catId].groups.find(function(g){return g.id===sgId;});targetName=grp?grp.name:'';recCount=(state.data[catId].records[sgId]||[]).length;}
  var label=type==='cat'?'카테고리':'그룹';
  document.getElementById('modal-title').textContent=label+' 삭제';
  document.getElementById('modal-desc').innerHTML='<strong>"'+esc(targetName)+'"</strong> '+label+(recCount>0?'와 모든 기록 <strong>'+recCount+'건</strong>':'')+'을 삭제하려면<br>'+label+' 이름을 정확히 입력하세요.';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><input id="modal-input" type="text" maxlength="30" placeholder="'+esc(targetName)+'"></div>';
  document.getElementById('modal-confirm').textContent='삭제';
  document.getElementById('modal-confirm').className='btn-confirm danger';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var inp=document.getElementById('modal-input');if(inp)inp.focus();},50);
}

// 추가 모달
function openModal(mode,catId){
  modalMode=mode;modalCat=catId||null;
  document.getElementById('modal-title').textContent=mode==='cat'?'카테고리 추가':'그룹 추가';
  document.getElementById('modal-desc').textContent='';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><input id="modal-input" type="text" maxlength="30" placeholder="'+(mode==='cat'?'예) 봉사활동':'예) 농구동아리')+'"></div>';
  document.getElementById('modal-confirm').textContent='추가';
  document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var inp=document.getElementById('modal-input');if(inp)inp.focus();},50);
}

function closeModal(){document.getElementById('modal').style.display='none';}

function confirmModal(){
  // 기록 수정
  if(modalMode==='edit-rec'){
    var date=document.getElementById('er-date').value;
    var name=document.getElementById('er-name').value.trim();
    var count=parseInt(document.getElementById('er-count').value)||0;
    if(!name){showToast('행사/모임명을 입력해 주세요');return;}
    if(!date){showToast('날짜를 선택해 주세요');return;}
    if(count<=0){showToast('인원 수를 입력해 주세요');return;}
    var recs=state.data[modalCat].records[modalDelTarget];
    var rec=recs.find(function(r){return r.id===modalRecTarget;});
    if(rec){rec.date=date;rec.name=name;rec.count=count;}
    persist();closeModal();renderPanels();showToast('기록이 수정되었습니다');
    return;
  }
  // 이름 수정
  if(modalMode==='edit-cat'||modalMode==='edit-sg'){
    var inp=document.getElementById('modal-input');
    var val=inp?inp.value.trim():'';
    if(!val){showToast('이름을 입력해 주세요');return;}
    if(modalMode==='edit-cat'){var cat=state.cats.find(function(c){return c.id===modalCat;});if(cat)cat.name=val;}
    else{var grp=state.data[modalCat].groups.find(function(g){return g.id===modalDelTarget;});if(grp)grp.name=val;}
    persist();closeModal();render();showToast('이름이 수정되었습니다');
    return;
  }
  // 삭제
  if(modalMode==='del-cat'||modalMode==='del-sg'){
    var inp2=document.getElementById('modal-input');
    var val2=inp2?inp2.value.trim():'';
    var isCat=modalMode==='del-cat';
    var targetName=isCat?(state.cats.find(function(c){return c.id===modalCat;})||{}).name:(state.data[modalCat].groups.find(function(g){return g.id===modalDelTarget;})||{}).name;
    if(val2!==targetName){if(inp2){inp2.className='error';inp2.classList.remove('shake');void inp2.offsetWidth;inp2.classList.add('shake');}showToast('이름이 일치하지 않아요');return;}
    closeModal();
    if(isCat){state.cats=state.cats.filter(function(c){return c.id!==modalCat;});delete state.data[modalCat];delete curSg[modalCat];delete filters[modalCat];curCat=state.cats.length?state.cats[0].id:'';persist();render();showToast('카테고리가 삭제되었습니다');}
    else{state.data[modalCat].groups=state.data[modalCat].groups.filter(function(g){return g.id!==modalDelTarget;});delete state.data[modalCat].records[modalDelTarget];curSg[modalCat]=state.data[modalCat].groups.length?state.data[modalCat].groups[0].id:null;persist();renderPanels();showToast('그룹이 삭제되었습니다');}
    return;
  }
  // 추가
  var inp3=document.getElementById('modal-input');
  var val3=inp3?inp3.value.trim():'';
  if(!val3){showToast('이름을 입력해 주세요');return;}
  if(modalMode==='cat'){var id='cat-'+Date.now();state.cats.push({id:id,name:val3});state.data[id]={groups:[],records:{}};filters[id]={from:'',to:''};curCat=id;persist();closeModal();render();showToast('"'+val3+'" 카테고리가 추가되었습니다');}
  else{var id2='sg-'+Date.now();state.data[modalCat].groups.push({id:id2,name:val3});state.data[modalCat].records[id2]=[];curSg[modalCat]=id2;persist();closeModal();renderPanels();showToast('"'+val3+'" 그룹이 추가되었습니다');}
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

document.getElementById('btn-addtab').addEventListener('click',function(){openModal('cat');});
document.getElementById('modal-cancel').addEventListener('click',closeModal);
document.getElementById('modal-confirm').addEventListener('click',confirmModal);
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

loadFromSheet();
</script>
</body>
</html>
