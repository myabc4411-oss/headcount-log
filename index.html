<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>headcount-log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:900px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1rem}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:#1D9E75;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.h-title{font-size:20px;font-weight:600;color:#111}
.h-sub{font-size:12px;color:#888;margin-top:2px}
.sync-status{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.sync-status.ok{background:#E1F5EE;color:#0F6E56}
.sync-status.loading{background:#fff3cd;color:#856404}
.sync-status.error{background:#fde8e8;color:#a32d2d}

/* 검색창 */
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:8px 14px}
.search-bar i{color:#aaa;font-size:16px;flex-shrink:0}
.search-bar input{flex:1;border:none;outline:none;font-size:13px;color:#111;background:transparent;font-family:inherit}
.search-bar input::placeholder{color:#bbb}
.search-results{background:#fff;border:1px solid #e0e0d8;border-radius:10px;margin-bottom:1rem;overflow:hidden;display:none}
.search-result-item{padding:10px 16px;border-bottom:1px solid #f0f0ea;cursor:pointer;transition:background .1s}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:#f5f5f0}
.sri-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sri-path{font-size:11px;color:#aaa}
.sri-name{font-size:13px;font-weight:500;color:#111}
.sri-date{font-size:11px;color:#aaa;margin-left:auto}
.sri-chips{display:flex;gap:4px;flex-wrap:wrap}
.sri-chip{font-size:10px;padding:2px 6px;border-radius:4px;background:#f0f0ea;color:#555}
.sri-chip.hl{background:#E1F5EE;color:#0F6E56;font-weight:600}
.no-results{padding:1.5rem;text-align:center;color:#bbb;font-size:13px}

/* 탭 */
.tabs-wrap{display:flex;align-items:center;border-bottom:1px solid #e0e0d8;margin-bottom:1.25rem}
.tabs-scroll{display:flex;align-items:flex-end;flex:1;overflow-x:auto;scrollbar-width:none}
.tabs-scroll::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.active{color:#0F6E56;border-bottom-color:#1D9E75}
.tab:hover:not(.active){color:#333}
.tab-name{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cnt{font-size:11px;background:#eee;color:#666;border-radius:10px;padding:1px 6px;font-weight:400}
.tab.active .cnt{background:#E1F5EE;color:#0F6E56}
.tab-edit{font-size:11px;color:#ccc;padding:1px 3px;cursor:pointer;line-height:1;background:none;border:none;margin-left:1px}
.tab-edit:hover{color:#0F6E56}
.tab-del{font-size:12px;color:#ccc;padding:1px 3px;cursor:pointer;line-height:1;background:none;border:none;margin-left:1px}
.tab-del:hover{color:#c0392b}
.btn-addtab{display:flex;align-items:center;gap:4px;padding:7px 12px;border:none;background:none;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:color .15s}
.btn-addtab:hover{color:#0F6E56}
.panel{display:none}.panel.active{display:block}

/* 대시보드 */
.dashboard{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.dashboard-title{font-size:13px;font-weight:600;color:#444;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.dash-controls{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.dash-controls label{font-size:11px;color:#666;font-weight:600;white-space:nowrap}
.dash-controls select{font-size:12px;padding:3px 7px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;outline:none}
.dash-controls select:focus{border-color:#1D9E75}
.dash-date-range{display:flex;align-items:center;gap:4px}
.dash-date-range input[type=date]{font-size:11px;padding:3px 6px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit;outline:none}
.dash-date-range input[type=date]:focus{border-color:#1D9E75}
.dash-date-sep{font-size:11px;color:#aaa}
.btn-dash-reset{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer}
.dash-cnt-badge{font-size:11px;color:#aaa}
.dash-grid{display:grid;grid-template-columns:1fr 12px 1fr;gap:0;align-items:start}
.dash-divider{background:#e8e8e0;width:1px;margin:0 auto}
.dash-section-title{font-size:11px;font-weight:600;color:#888;margin-bottom:.4rem}
.dash-row{display:flex;gap:6px;flex-wrap:wrap}
.dash-chip{display:flex;flex-direction:column;align-items:center;border-radius:8px;padding:6px 10px;min-width:56px}
.dash-chip.total{background:#E1F5EE}
.dash-chip.male{background:#EBF4FF}
.dash-chip.female{background:#FEF0F5}
.dash-chip.age{background:#f5f5f0}
.dash-chip-label{font-size:10px;color:#888;margin-bottom:2px}
.dash-chip-val{font-size:15px;font-weight:600}
.dash-chip.total .dash-chip-val{color:#0F6E56}
.dash-chip.male .dash-chip-val{color:#2563EB}
.dash-chip.female .dash-chip-val{color:#DB2777}
.dash-chip.age .dash-chip-val{color:#333}

/* 레이아웃 */
.layout{display:grid;grid-template-columns:175px 1fr;gap:12px;min-height:280px}
.sidebar{display:flex;flex-direction:column;gap:4px}
.sg-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#666;border:1px solid transparent;transition:all .15s;gap:4px}
.sg-item:hover{background:#f0f0ea;color:#333}
.sg-item.active{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB;font-weight:500}
.sg-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sg-cnt{font-size:11px;opacity:.7;flex-shrink:0}
.sg-edit{font-size:11px;color:#ccc;padding:1px 3px;cursor:pointer;background:none;border:none;flex-shrink:0;opacity:0;transition:opacity .15s}
.sg-item:hover .sg-edit,.sg-item.active .sg-edit{opacity:1}
.sg-edit:hover{color:#0F6E56}
.btn-addsg{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:8px;border:1px dashed #ccc;background:none;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;transition:all .15s;width:100%}
.btn-addsg:hover{border-color:#1D9E75;color:#0F6E56}

/* 추가 카드 */
.add-card{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:1rem;margin-bottom:.75rem}
.add-top-row{display:grid;grid-template-columns:120px 1fr;gap:8px;margin-bottom:.75rem}
.field-g label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px}
.field-g input{width:100%;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit;outline:none;transition:border-color .15s}
.field-g input:focus{border-color:#1D9E75}
.count-table-wrap{overflow-x:auto}
.count-table{width:100%;border-collapse:collapse;font-size:12px}
.count-table th{background:#f5f5f0;padding:6px 8px;text-align:center;font-weight:600;color:#555;border:1px solid #e8e8e0}
.count-table td{padding:4px 6px;border:1px solid #e8e8e0;text-align:center}
.count-table td input{width:58px;font-size:12px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;text-align:center;background:#fff;color:#111;font-family:inherit;outline:none}
.count-table td input:focus{border-color:#1D9E75}
.count-table .row-label{font-weight:600;color:#555;background:#f9f9f7;text-align:left;padding:6px 10px;white-space:nowrap}
.count-table .total-cell{background:#E1F5EE;color:#0F6E56;font-weight:600;font-size:13px}
.count-table .col-total{background:#f0f9f5;color:#0F6E56;font-weight:600}
.add-btn-row{display:flex;justify-content:flex-end;margin-top:.75rem}
.btn-add{display:flex;align-items:center;gap:4px;padding:7px 14px;border-radius:6px;background:#1D9E75;color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer}
.btn-add:hover{background:#0F6E56}

/* 정기 템플릿 */
.template-section{margin-bottom:.75rem}
.template-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.template-label{font-size:12px;font-weight:600;color:#555;display:flex;align-items:center;gap:5px}
.btn-add-tpl{font-size:11px;padding:3px 8px;border-radius:4px;border:1px dashed #1D9E75;background:none;color:#0F6E56;cursor:pointer}
.tpl-list{display:flex;flex-direction:column;gap:5px}
.tpl-item{display:flex;align-items:center;padding:8px 10px;background:#f0f9f5;border:1px solid #c8eedd;border-radius:8px;font-size:12px;gap:8px;flex-wrap:wrap}
.tpl-name{font-weight:600;color:#0F6E56;min-width:80px;flex-shrink:0}
.tpl-day{font-size:11px;color:#888;flex-shrink:0}
.tpl-stats{display:flex;align-items:center;gap:4px;flex:1;flex-wrap:wrap}
.tpl-stat-chip{display:flex;flex-direction:column;align-items:center;background:#fff;border:1px solid #e8e8e0;border-radius:6px;padding:3px 7px;min-width:44px}
.tpl-stat-chip.male{border-color:#BFDBFE;background:#EBF4FF}
.tpl-stat-chip.female{border-color:#FBCFE8;background:#FEF0F5}
.tpl-stat-chip.tl{border-color:#9FE1CB;background:#E1F5EE}
.tpl-stat-label{font-size:9px;color:#888}
.tpl-stat-val{font-size:12px;font-weight:600;color:#111}
.tpl-stat-chip.male .tpl-stat-val{color:#2563EB}
.tpl-stat-chip.female .tpl-stat-val{color:#DB2777}
.tpl-stat-chip.tl .tpl-stat-val{color:#0F6E56}
.tpl-btns{display:flex;gap:4px;flex-shrink:0;margin-left:auto}
.btn-tpl-use{font-size:11px;padding:4px 10px;border-radius:4px;background:#1D9E75;color:#fff;border:none;cursor:pointer;font-weight:500}
.btn-tpl-use:hover{background:#0F6E56}
.btn-tpl-edit{font-size:11px;padding:4px 7px;border-radius:4px;background:none;border:1px solid #9FE1CB;color:#0F6E56;cursor:pointer}
.btn-tpl-edit:hover{background:#E1F5EE}
.btn-tpl-del{font-size:11px;padding:4px 6px;border-radius:4px;background:none;border:1px solid #ddd;color:#aaa;cursor:pointer}
.btn-tpl-del:hover{color:#c0392b;border-color:#c0392b}

.sg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.sg-title{font-size:15px;font-weight:600;color:#111}
.sg-header-btns{display:flex;align-items:center;gap:4px}
.btn-editsg{background:none;border:none;cursor:pointer;font-size:12px;color:#aaa;padding:3px 6px;border-radius:4px}
.btn-editsg:hover{color:#0F6E56}
.btn-delsg{background:none;border:none;cursor:pointer;font-size:12px;color:#bbb;padding:3px 6px;border-radius:4px}
.btn-delsg:hover{color:#c0392b}
.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:.75rem;background:#f0f0ea;border-radius:8px;padding:8px 10px;flex-wrap:wrap}
.filter-bar label{font-size:11px;font-weight:600;color:#666;white-space:nowrap}
.filter-bar input[type=date]{font-size:12px;padding:4px 7px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit}
.filter-bar input[type=date]:focus{outline:none;border-color:#1D9E75}
.filter-sep{font-size:12px;color:#aaa}
.btn-reset{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;margin-left:auto}
.filter-tag{font-size:11px;color:#0F6E56;background:#E1F5EE;border-radius:4px;padding:2px 7px;white-space:nowrap}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:.75rem}
.stat{background:#f0f0ea;border-radius:8px;padding:.6rem .8rem}
.stat-label{font-size:10px;color:#777;margin-bottom:2px}
.stat-val{font-size:18px;font-weight:600;color:#111}
.stat-unit{font-size:11px;font-weight:400;color:#888}
.records-list{display:flex;flex-direction:column;gap:6px}
.rec{background:#fff;border:1px solid #e8e8e0;border-radius:8px;padding:.7rem .9rem;transition:border-color .15s}
.rec:hover{border-color:#bbb}
.rec-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rec-left{display:flex;align-items:center;gap:10px}
.rec-date{font-size:11px;color:#aaa;flex-shrink:0;width:76px}
.rec-name{font-size:13px;color:#111;font-weight:500}
.rec-total{font-size:15px;font-weight:600;color:#0F6E56;flex-shrink:0}
.rec-unit{font-size:11px;color:#bbb}
.rec-btns{display:flex;align-items:center;gap:4px}
.btn-edit-rec,.btn-copy-rec,.btn-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:2px 4px;border-radius:4px;opacity:0;transition:color .15s}
.rec:hover .btn-edit-rec,.rec:hover .btn-copy-rec,.rec:hover .btn-del{opacity:1}
.btn-edit-rec:hover{color:#0F6E56}
.btn-copy-rec:hover{color:#856404}
.btn-del:hover{color:#c0392b}
.rec-detail{display:flex;flex-wrap:wrap;gap:4px}
.rdc{display:flex;flex-direction:column;align-items:center;border-radius:5px;padding:3px 7px;min-width:44px;background:#f5f5f0}
.rdc.m{background:#EBF4FF}.rdc.f{background:#FEF0F5}.rdc.t{background:#E1F5EE}
.rdc-label{font-size:9px;color:#888}
.rdc-val{font-size:12px;font-weight:600;color:#111}
.rdc.m .rdc-val{color:#2563EB}.rdc.f .rdc-val{color:#DB2777}.rdc.t .rdc-val{color:#0F6E56}
.empty{text-align:center;padding:2rem .5rem;color:#bbb;font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:.5rem;opacity:.4}
.no-sg{text-align:center;padding:3rem 1rem;color:#bbb;font-size:13px}
.no-sg i{font-size:32px;display:block;margin-bottom:.6rem;opacity:.3}
.no-cat{text-align:center;padding:4rem 1rem;color:#bbb;font-size:13px}
.no-cat i{font-size:36px;display:block;margin-bottom:.75rem;opacity:.3}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;border:1px solid #e8e8e0;width:400px;padding:1.25rem;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:.75rem;color:#111}
.modal-desc{font-size:12px;color:#888;margin-bottom:1rem;line-height:1.6}
.modal-desc strong{color:#c0392b;font-weight:600}
.modal-field{margin-bottom:.75rem}
.modal-field label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px}
.modal-field input,.modal-field select{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:inherit;outline:none;transition:border-color .15s}
.modal-field input:focus,.modal-field select:focus{border-color:#1D9E75}
.modal-field input.error{border-color:#c0392b;background:#fff8f8}
.modal-count-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:.5rem}
.modal-count-table th{background:#f5f5f0;padding:6px 8px;text-align:center;font-weight:600;color:#555;border:1px solid #e8e8e0}
.modal-count-table td{padding:4px 5px;border:1px solid #e8e8e0;text-align:center}
.modal-count-table td input{width:50px;font-size:12px;padding:4px 5px;border:1px solid #ddd;border-radius:4px;text-align:center;background:#fff;color:#111;font-family:inherit;outline:none}
.modal-count-table td input:focus{border-color:#1D9E75}
.modal-count-table .row-label{font-weight:600;color:#555;background:#f9f9f7;text-align:left;padding:6px 8px}
.modal-count-table .total-cell{background:#E1F5EE;color:#0F6E56;font-weight:600}
.modal-count-table .col-total{background:#f0f9f5;color:#0F6E56;font-weight:600}
.modal-btns{display:flex;justify-content:flex-end;gap:6px;margin-top:.75rem}
.btn-cancel{padding:7px 14px;border-radius:6px;background:none;border:1px solid #ddd;font-size:13px;cursor:pointer;color:#444}
.btn-confirm{padding:7px 14px;border-radius:6px;background:#1D9E75;color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer}
.btn-confirm:hover{background:#0F6E56}
.btn-confirm.danger{background:#c0392b}
.btn-confirm.danger:hover{background:#a93226}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .3s ease}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:620px){.layout{grid-template-columns:1fr}.add-top-row{grid-template-columns:1fr}.dash-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-left">
      <div class="logo"><i class="ti ti-users"></i></div>
      <div><div class="h-title">headcount-log</div><div class="h-sub">카테고리 → 그룹 → 날짜별 인원 기록</div></div>
    </div>
    <div id="sync-status" class="sync-status loading">⏳ 불러오는 중...</div>
  </div>

  <!-- 검색창 -->
  <div class="search-bar">
    <i class="ti ti-search"></i>
    <input type="text" id="global-search" placeholder="행사명, 날짜, 그룹명으로 검색..." autocomplete="off">
    <button id="search-clear" style="background:none;border:none;cursor:pointer;color:#bbb;font-size:13px;display:none">✕</button>
  </div>
  <div class="search-results" id="search-results"></div>

  <div class="tabs-wrap">
    <div class="tabs-scroll" id="tabs-scroll"></div>
    <button class="btn-addtab" id="btn-addtab"><i class="ti ti-plus" style="font-size:13px"></i> 카테고리 추가</button>
  </div>
  <div id="panels"></div>
</div>

<div id="modal" style="display:none" class="modal-bg">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="modal-desc" id="modal-desc"></div>
    <div id="modal-fields"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">취소</button>
      <button class="btn-confirm" id="modal-confirm">확인</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbzI2VU4Av7gI-hGdRluYj_KnXX6aG6muKmppOIIdQTTuNgjTBegyEVrNyw24CFsXphrjQ/exec';
var AGES=['유아','청소년','대학생','성인'];
var DAYS=['일','월','화','수','목','금','토'];
var state={cats:[],data:{}};
var curCat='',curSg={},filters={};
var dashSg={},dashFrom={},dashTo={};
var modalMode=null,modalCat=null,modalDelTarget=null,modalRecTarget=null;
var DEFAULT_CATS=[{id:'biz',name:'사업'},{id:'club',name:'동아리'},{id:'reg',name:'정기형'}];

function setStatus(t,m){var el=document.getElementById('sync-status');el.className='sync-status '+t;el.textContent=m;}
function stateToRows(){return[[JSON.stringify(state)]];}
function rowsToState(rows){if(!rows||!rows.length||!rows[0][0])return null;try{return JSON.parse(rows[0][0]);}catch(e){return null;}}

function loadFromSheet(){
  setStatus('loading','⏳ 불러오는 중...');
  fetch(API_URL+'?action=load').then(function(r){return r.json();}).then(function(res){
    if(res.ok&&res.data){var p=rowsToState(res.data);if(p&&p.cats&&p.cats.length)state=p;else initDefault();}
    else initDefault();
    afterLoad();setStatus('ok','✅ 동기화됨');
  }).catch(function(){initDefault();afterLoad();setStatus('error','⚠️ 오프라인 모드');});
}

function saveToSheet(){
  setStatus('loading','💾 저장 중...');
  fetch(API_URL+'?action=save&payload='+encodeURIComponent(JSON.stringify(stateToRows())))
    .then(function(r){return r.json();}).then(function(res){setStatus(res.ok?'ok':'error',res.ok?'✅ 저장됨':'⚠️ 저장 실패');})
    .catch(function(){setStatus('error','⚠️ 저장 실패');});
}

function initDefault(){
  state={cats:DEFAULT_CATS.slice(),data:{}};
  state.cats.forEach(function(c){state.data[c.id]={groups:[],records:{},templates:{}};});
}
function afterLoad(){
  state.cats.forEach(function(c){
    if(!state.data[c.id])state.data[c.id]={groups:[],records:{},templates:{}};
    if(!state.data[c.id].templates)state.data[c.id].templates={};
    if(!curSg[c.id]&&state.data[c.id].groups.length)curSg[c.id]=state.data[c.id].groups[0].id;
    if(!filters[c.id])filters[c.id]={from:'',to:''};
    if(!dashSg[c.id])dashSg[c.id]='all';
    if(!dashFrom[c.id])dashFrom[c.id]='';
    if(!dashTo[c.id])dashTo[c.id]='';
  });
  if(!curCat||!state.cats.find(function(c){return c.id===curCat;}))curCat=state.cats.length?state.cats[0].id:'';
  render();
}
function persist(){saveToSheet();}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function totalGroups(catId){return state.data[catId]&&state.data[catId].groups?state.data[catId].groups.length:0;}
function applyFilter(recs,catId){
  var f=filters[catId]||{};
  return recs.filter(function(r){if(f.from&&r.date<f.from)return false;if(f.to&&r.date>f.to)return false;return true;});
}
function applyDateRange(recs,from,to){
  return recs.filter(function(r){if(from&&r.date<from)return false;if(to&&r.date>to)return false;return true;});
}

function sumCounts(c){return AGES.reduce(function(s,a){return s+Number(c['m_'+a]||0)+Number(c['f_'+a]||0);},0);}
function maleTotal(c){return AGES.reduce(function(s,a){return s+Number(c['m_'+a]||0);},0);}
function femaleTotal(c){return AGES.reduce(function(s,a){return s+Number(c['f_'+a]||0);},0);}
function ageTotal(c,age){return Number(c['m_'+age]||0)+Number(c['f_'+age]||0);}

function accumStats(recs){
  var r={total:0,male:0,female:0};
  AGES.forEach(function(a){r['m_'+a]=0;r['f_'+a]=0;r[a]=0;});
  recs.forEach(function(rec){
    var c=rec.counts||{};
    r.male+=maleTotal(c);r.female+=femaleTotal(c);
    AGES.forEach(function(a){r['m_'+a]+=Number(c['m_'+a]||0);r['f_'+a]+=Number(c['f_'+a]||0);r[a]+=ageTotal(c,a);});
  });
  r.total=r.male+r.female;
  return r;
}

function getCatRecs(catId,sgId,from,to){
  var d=state.data[catId];if(!d)return[];
  var recs=[];
  if(sgId==='all'){d.groups.forEach(function(g){(d.records[g.id]||[]).forEach(function(r){recs.push(r);});});}
  else{recs=d.records[sgId]||[];}
  return applyDateRange(recs,from,to);
}

// 인원표 HTML
function countTableHtml(prefix,counts,tableClass){
  counts=counts||{};tableClass=tableClass||'count-table';
  var h='<div class="count-table-wrap"><table class="'+tableClass+'"><thead><tr><th></th>';
  AGES.forEach(function(a){h+='<th>'+a+'</th>';});
  h+='<th>합계</th></tr></thead><tbody>';
  ['남','여'].forEach(function(gender){
    var k=gender==='남'?'m':'f';
    h+='<tr><td class="row-label">'+gender+'</td>';
    AGES.forEach(function(a){h+='<td><input type="number" min="0" id="'+prefix+'_'+k+'_'+a+'" value="'+(counts[k+'_'+a]||0)+'" oninput="updateTotals(\''+prefix+'\')"></td>';});
    h+='<td class="col-total" id="'+prefix+'_tot_'+k+'">0</td></tr>';
  });
  h+='<tr><td class="row-label">합계</td>';
  AGES.forEach(function(a){h+='<td class="col-total" id="'+prefix+'_tot_'+a+'">0</td>';});
  h+='<td class="total-cell" id="'+prefix+'_tot_all">0</td></tr>';
  h+='</tbody></table></div>';
  return h;
}

function updateTotals(prefix){
  var tot=0,m=0,f=0;
  AGES.forEach(function(a){
    var mv=Number(document.getElementById(prefix+'_m_'+a)?.value||0);
    var fv=Number(document.getElementById(prefix+'_f_'+a)?.value||0);
    m+=mv;f+=fv;tot+=mv+fv;
    var el=document.getElementById(prefix+'_tot_'+a);if(el)el.textContent=mv+fv;
  });
  var em=document.getElementById(prefix+'_tot_m');if(em)em.textContent=m;
  var ef=document.getElementById(prefix+'_tot_f');if(ef)ef.textContent=f;
  var et=document.getElementById(prefix+'_tot_all');if(et)et.textContent=tot;
}

function getTableCounts(prefix){
  var c={};
  AGES.forEach(function(a){
    c['m_'+a]=Number(document.getElementById(prefix+'_m_'+a)?.value||0);
    c['f_'+a]=Number(document.getElementById(prefix+'_f_'+a)?.value||0);
  });
  return c;
}

// 대시보드 HTML

  var d=state.data[catId];if(!d||!d.groups.length)return'';
  var selSg=dashSg[catId]||'all';
  var from=dashFrom[catId]||'';
  var to=dashTo[catId]||'';
  var recs=getCatRecs(catId,selSg,from,to);
  var st=accumStats(recs);
  var groupOptions='<option value="all">전체 (모든 그룹)</option>';
  d.groups.forEach(function(g){groupOptions+='<option value="'+g.id+'"'+(selSg===g.id?' selected':'')+'>'+esc(g.name)+'</option>';});
  var hasDateFilter=from||to;

  return '<div class="dashboard">'
    +'<div class="dashboard-title"><i class="ti ti-chart-bar" style="font-size:15px;color:#1D9E75"></i> 인원 현황</div>'
    +'<div class="dash-controls">'
    +'<label>보기 범위</label>'
    +'<select onchange="changeDashSg(\''+catId+'\',this.value)">'+groupOptions+'</select>'
    +'<label style="margin-left:8px">기간</label>'
    +'<div class="dash-date-range">'
    +'<input type="date" value="'+from+'" onchange="changeDashDate(\''+catId+'\',\'from\',this.value)">'
    +'<span class="dash-date-sep">~</span>'
    +'<input type="date" value="'+to+'" onchange="changeDashDate(\''+catId+'\',\'to\',this.value)">'
    +'</div>'
    +(hasDateFilter?'<button class="btn-dash-reset" onclick="resetDashDate(\''+catId+'\')">초기화</button>':'')
    +'<span class="dash-cnt-badge">총 '+recs.length+'건</span>'
    +'</div>'
    +'<div class="dash-grid">'
    +'<div><div class="dash-section-title">성별</div><div class="dash-row">'
    +'<div class="dash-chip total"><div class="dash-chip-label">총 인원</div><div class="dash-chip-val">'+st.total+'</div></div>'
    +'<div class="dash-chip male"><div class="dash-chip-label">남</div><div class="dash-chip-val">'+st.male+'</div></div>'
    +'<div class="dash-chip female"><div class="dash-chip-label">여</div><div class="dash-chip-val">'+st.female+'</div></div>'
    +'</div></div>'
    +'<div class="dash-divider"></div>'
    +'<div><div class="dash-section-title">연령대</div><div class="dash-row">'
    +AGES.map(function(a){return '<div class="dash-chip age"><div class="dash-chip-label">'+a+'</div><div class="dash-chip-val">'+st[a]+'</div></div>';}).join('')
    +'</div></div>'
    +'</div></div>';
}

function changeDashSg(catId,val){dashSg[catId]=val;renderPanels();}
function changeDashDate(catId,key,val){
  if(key==='from')dashFrom[catId]=val;else dashTo[catId]=val;
  renderPanels();
}
function resetDashDate(catId){dashFrom[catId]='';dashTo[catId]='';renderPanels();}

// 전체 검색
function doSearch(q){
  var res=document.getElementById('search-results');
  var clearBtn=document.getElementById('search-clear');
  if(!q){res.style.display='none';clearBtn.style.display='none';return;}
  clearBtn.style.display='block';
  q=q.toLowerCase();
  var items=[];
  state.cats.forEach(function(cat){
    var d=state.data[cat.id];if(!d)return;
    d.groups.forEach(function(g){
      (d.records[g.id]||[]).forEach(function(r){
        if(r.name.toLowerCase().indexOf(q)>=0||r.date.indexOf(q)>=0||g.name.toLowerCase().indexOf(q)>=0||cat.name.toLowerCase().indexOf(q)>=0){
          items.push({cat:cat,group:g,rec:r});
        }
      });
    });
  });
  if(!items.length){
    res.style.display='block';
    res.innerHTML='<div class="no-results">검색 결과가 없어요</div>';
    return;
  }
  items.sort(function(a,b){return b.rec.date.localeCompare(a.rec.date);});
  res.style.display='block';
  res.innerHTML=items.slice(0,20).map(function(item){
    var c=item.rec.counts||{};
    var tot=sumCounts(c),m=maleTotal(c),f=femaleTotal(c);
    return '<div class="search-result-item" data-cat="'+item.cat.id+'" data-sg="'+item.group.id+'">'
      +'<div class="sri-top">'
      +'<span class="sri-path">'+esc(item.cat.name)+' › '+esc(item.group.name)+'</span>'
      +'<span class="sri-name">'+esc(item.rec.name)+'</span>'
      +'<span class="sri-date">'+item.rec.date+'</span>'
      +'</div>'
      +'<div class="sri-chips">'
      +'<span class="sri-chip hl">총 '+tot+'명</span>'
      +'<span class="sri-chip">남 '+m+'</span>'
      +'<span class="sri-chip">여 '+f+'</span>'
      +AGES.map(function(a){return ageTotal(c,a)>0?'<span class="sri-chip">'+a+' '+ageTotal(c,a)+'</span>':'';}).join('')
      +'</div></div>';
  }).join('');
  res.querySelectorAll('.search-result-item').forEach(function(el){
    el.addEventListener('click',function(){
      var catId=el.getAttribute('data-cat');
      var sgId=el.getAttribute('data-sg');
      switchCat(catId);
      curSg[catId]=sgId;
      renderPanels();
      document.getElementById('global-search').value='';
      res.style.display='none';
      clearBtn.style.display='none';
      showToast('해당 그룹으로 이동했어요');
    });
  });
}

function render(){renderTabs();renderPanels();}

function renderTabs(){
  document.getElementById('tabs-scroll').innerHTML=state.cats.map(function(c){
    return '<button class="tab'+(curCat===c.id?' active':'')+'" data-cat="'+c.id+'">'
      +'<span class="tab-name">'+esc(c.name)+'</span><span class="cnt">'+totalGroups(c.id)+'</span>'
      +'<span class="tab-edit" data-edit="'+c.id+'">✎</span>'
      +'<span class="tab-del" data-del="'+c.id+'">×</span>'
      +'</button>';
  }).join('');
  document.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click',function(e){
      if(e.target.classList.contains('tab-del')||e.target.classList.contains('tab-edit'))return;
      switchCat(btn.getAttribute('data-cat'));
    });
  });
  document.querySelectorAll('.tab-edit').forEach(function(s){s.addEventListener('click',function(e){e.stopPropagation();openEdit('cat',s.getAttribute('data-edit'));});});
  document.querySelectorAll('.tab-del').forEach(function(s){s.addEventListener('click',function(e){e.stopPropagation();openDel('cat',s.getAttribute('data-del'));});});
}

function renderPanels(){
  if(!state.cats.length){document.getElementById('panels').innerHTML='<div class="no-cat"><i class="ti ti-layout-grid-add"></i>위의 "+ 카테고리 추가" 버튼으로 카테고리를 만들어 보세요</div>';return;}
  document.getElementById('panels').innerHTML=state.cats.map(function(c){
    return '<div id="panel-'+c.id+'" class="panel'+(curCat===c.id?' active':'')+'">'+buildPanel(c.id)+'</div>';
  }).join('');
  state.cats.forEach(function(c){
    var panel=document.getElementById('panel-'+c.id);if(!panel)return;
    panel.querySelectorAll('.sg-item').forEach(function(el){
      el.addEventListener('click',function(e){if(e.target.classList.contains('sg-edit'))return;selectSg(el.getAttribute('data-cat'),el.getAttribute('data-sg'));});
    });
    panel.querySelectorAll('.sg-edit').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();openEdit('sg',b.getAttribute('data-cat'),b.getAttribute('data-sg'));});});
    var as=panel.querySelector('.btn-addsg');if(as)as.addEventListener('click',function(){openModal('sg',c.id);});
    var es=panel.querySelector('.btn-editsg');if(es)es.addEventListener('click',function(){openEdit('sg',es.getAttribute('data-cat'),es.getAttribute('data-sg'));});
    var ds=panel.querySelector('.btn-delsg');if(ds)ds.addEventListener('click',function(){openDel('sg',ds.getAttribute('data-cat'),ds.getAttribute('data-sg'));});
    var ar=panel.querySelector('.btn-add');if(ar)ar.addEventListener('click',function(){addRecord(ar.getAttribute('data-cat'),ar.getAttribute('data-sg'));});
    panel.querySelectorAll('.btn-edit-rec').forEach(function(b){b.addEventListener('click',function(){openEditRec(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-rec'));});});
    panel.querySelectorAll('.btn-copy-rec').forEach(function(b){b.addEventListener('click',function(){copyRecord(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-rec'));});});
    panel.querySelectorAll('.btn-del').forEach(function(b){b.addEventListener('click',function(){delRecord(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-rec'));});});
    panel.querySelectorAll('.btn-tpl-use').forEach(function(b){b.addEventListener('click',function(){useTpl(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-tpl'));});});
    panel.querySelectorAll('.btn-tpl-edit').forEach(function(b){b.addEventListener('click',function(){openEditTpl(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-tpl'));});});
    panel.querySelectorAll('.btn-tpl-del').forEach(function(b){b.addEventListener('click',function(){delTpl(b.getAttribute('data-cat'),b.getAttribute('data-sg'),b.getAttribute('data-tpl'));});});
    var atb=panel.querySelector('.btn-add-tpl');if(atb)atb.addEventListener('click',function(){openAddTpl(atb.getAttribute('data-cat'),atb.getAttribute('data-sg'));});
    var fi=panel.querySelector('.filter-from'),ti=panel.querySelector('.filter-to');
    if(fi)fi.addEventListener('change',function(){setFilter(c.id,'from',fi.value);});
    if(ti)ti.addEventListener('change',function(){setFilter(c.id,'to',ti.value);});
    var rb=panel.querySelector('.btn-reset');if(rb)rb.addEventListener('click',function(){resetFilter(c.id);});
    updateTotals('add-'+c.id);
  });
}

function buildPanel(catId){
  var d=state.data[catId]||{groups:[],records:{},templates:{}};
  var groups=d.groups,records=d.records,templates=d.templates||{};
  var activeSg=curSg[catId];
  var f=filters[catId]||{from:'',to:''},hasFilter=f.from||f.to;
  var sidebarHtml=groups.map(function(g){
    var cnt=applyFilter(records[g.id]||[],catId).length;
    return '<div class="sg-item'+(activeSg===g.id?' active':'')+'" data-cat="'+catId+'" data-sg="'+g.id+'">'
      +'<span class="sg-name">'+esc(g.name)+'</span><span class="sg-cnt">'+cnt+'</span>'
      +'<button class="sg-edit" data-cat="'+catId+'" data-sg="'+g.id+'">✎</button></div>';
  }).join('');

  var showContent=!!(activeSg&&groups.find(function(g){return g.id===activeSg;}));
  var g=showContent?groups.find(function(g){return g.id===activeSg;}):null;
  var recs=showContent?applyFilter(records[activeSg]||[],catId):[];
  var totalPeople=recs.reduce(function(s,r){return s+sumCounts(r.counts||{});},0);
  var sorted=recs.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var filterTag=hasFilter?'<span class="filter-tag">'+(f.from||'처음')+'~'+(f.to||'오늘')+' · '+recs.length+'건</span>':'';
  var tpls=showContent?(templates[activeSg]||[]):[];

  var tplHtml='';
  if(showContent){
    var tplItems=tpls.map(function(t){
      var tplRecs=(records[activeSg]||[]).filter(function(r){return r.name===t.name;});
      var tst=accumStats(tplRecs);
      return '<div class="tpl-item">'
        +'<span class="tpl-name">'+esc(t.name)+'</span>'
        +'<span class="tpl-day">매주 '+DAYS[t.day]+'요일</span>'
        +'<div class="tpl-stats">'
        +'<div class="tpl-stat-chip tl"><div class="tpl-stat-label">총인원</div><div class="tpl-stat-val">'+tst.total+'</div></div>'
        +'<div class="tpl-stat-chip male"><div class="tpl-stat-label">남</div><div class="tpl-stat-val">'+tst.male+'</div></div>'
        +'<div class="tpl-stat-chip female"><div class="tpl-stat-label">여</div><div class="tpl-stat-val">'+tst.female+'</div></div>'
        +AGES.map(function(a){return '<div class="tpl-stat-chip"><div class="tpl-stat-label">'+a+'</div><div class="tpl-stat-val">'+tst[a]+'</div></div>';}).join('')
        +'<span style="font-size:10px;color:#aaa;margin-left:2px">'+tplRecs.length+'회</span>'
        +'</div>'
        +'<div class="tpl-btns">'
        +'<button class="btn-tpl-use" data-cat="'+catId+'" data-sg="'+activeSg+'" data-tpl="'+t.id+'">이번 주 입력</button>'
        +'<button class="btn-tpl-edit" data-cat="'+catId+'" data-sg="'+activeSg+'" data-tpl="'+t.id+'">✎</button>'
        +'<button class="btn-tpl-del" data-cat="'+catId+'" data-sg="'+activeSg+'" data-tpl="'+t.id+'">✕</button>'
        +'</div></div>';
    }).join('');
    tplHtml='<div class="template-section">'
      +'<div class="template-header"><span class="template-label">📋 정기 템플릿</span>'
      +'<button class="btn-add-tpl" data-cat="'+catId+'" data-sg="'+activeSg+'">+ 템플릿 추가</button></div>'
      +(tpls.length?'<div class="tpl-list">'+tplItems+'</div>':'<div style="font-size:12px;color:#bbb;padding:4px 0">템플릿을 추가하면 매주 빠르게 입력할 수 있어요</div>')
      +'</div>';
  }

  else if(!showContent){contentHtml='<div class="no-sg"><i class="ti ti-hand-click"></i>왼쪽에서 그룹을 선택하세요</div>';}

    contentHtml='<div class="sg-header"><div class="sg-title">'+esc(g.name)+'</div>'
      +'<div class="sg-header-btns">'
      +'<button class="btn-editsg" data-cat="'+catId+'" data-sg="'+activeSg+'"><i class="ti ti-pencil"></i> 이름 수정</button>'

          +'<button class="btn-edit-rec" data-cat="'+catId+'" data-sg="'+activeSg+'" data-rec="'+r.id+'" title="수정"><i class="ti ti-pencil"></i></button>'
          +'<button class="btn-del" data-cat="'+catId+'" data-sg="'+activeSg+'" data-rec="'+r.id+'" title="삭제"><i class="ti ti-trash"></i></button>'

          +'<div class="rec-detail">'
          +'<div class="rdc t"><div class="rdc-label">총인원</div><div class="rdc-val">'+tot+'</div></div>'
          +'<div class="rdc m"><div class="rdc-label">남</div><div class="rdc-val">'+mTot+'</div></div>'
          +'<div class="rdc f"><div class="rdc-label">여</div><div class="rdc-val">'+fTot+'</div></div>'
          +AGES.map(function(a){return '<div class="rdc"><div class="rdc-label">'+a+'</div><div class="rdc-val">'+ageTotal(c,a)+'</div></div>';}).join('')
          +'</div></div>';
      }).join(''):'<div class="empty"><i class="ti ti-calendar-off"></i>'+(hasFilter?'해당 기간에 기록이 없어요':'아직 기록이 없어요')+'</div>')
      +'</div>';
  }

  return dashboardHtml(catId)
    +'<div class="layout"><div class="sidebar">'+sidebarHtml
    +'<button class="btn-addsg"><i class="ti ti-plus" style="font-size:13px"></i>그룹 추가</button>'
    +'</div><div class="content">'+contentHtml+'</div></div>';
}

function switchCat(catId){curCat=catId;render();}
function selectSg(catId,sgId){curSg[catId]=sgId;renderPanels();}
function setFilter(catId,key,val){if(!filters[catId])filters[catId]={};filters[catId][key]=val;renderPanels();}
function resetFilter(catId){filters[catId]={from:'',to:''};renderPanels();}

function addRecord(catId,sgId){
  var date=document.getElementById('add-date-'+catId).value;
  var name=document.getElementById('add-name-'+catId).value.trim();
  var counts=getTableCounts('add-'+catId);
  if(!name){showToast('행사/모임명을 입력해 주세요');return;}
  if(!date){showToast('날짜를 선택해 주세요');return;}
  if(sumCounts(counts)===0){showToast('인원 수를 입력해 주세요');return;}
  if(!state.data[catId].records[sgId])state.data[catId].records[sgId]=[];
  state.data[catId].records[sgId].push({id:Date.now()+'',date:date,name:name,counts:counts});
  persist();renderPanels();
  document.getElementById('add-name-'+catId).value='';
  showToast('기록이 추가되었습니다');
}

function delRecord(catId,sgId,recId){
  if(!confirm('이 기록을 삭제할까요?'))return;
  state.data[catId].records[sgId]=state.data[catId].records[sgId].filter(function(r){return r.id!==recId;});
  persist();renderPanels();showToast('삭제되었습니다');
}

function copyRecord(catId,sgId,recId){
  var rec=(state.data[catId].records[sgId]||[]).find(function(r){return r.id===recId;});if(!rec)return;
  var nr=JSON.parse(JSON.stringify(rec));nr.id=Date.now()+'';nr.date=today();
  state.data[catId].records[sgId].push(nr);
  persist();renderPanels();showToast('복사되었습니다');
}

    '<div class="modal-field"><label>강좌/행사명</label><input id="tpl-name" type="text" placeholder="예) 수요 요가 강좌"></div>'
    +'<div class="modal-field"><label>매주 요일</label><select id="tpl-day">'

function openEditTpl(catId,sgId,tplId){

  var tpl=tpls.find(function(t){return t.id===tplId;});if(!tpl)return;

    +'<div class="modal-field"><label>매주 요일</label><select id="tpl-edit-day">'

  document.getElementById('modal').style.display='flex';

}

function useTpl(catId,sgId,tplId){
  var tpls=state.data[catId].templates[sgId]||[];
  var tpl=tpls.find(function(t){return t.id===tplId;});if(!tpl)return;
  modalMode='use-tpl';modalCat=catId;modalDelTarget=sgId;modalRecTarget=tplId;

    '<div class="modal-field"><label>날짜</label><input id="tpl-date" type="date" value="'+today()+'"></div>'
    +countTableHtml('tpl-inp',{},'modal-count-table');
  document.getElementById('modal-confirm').textContent='추가';
  document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';

}

function delTpl(catId,sgId,tplId){
  if(!confirm('이 템플릿을 삭제할까요?'))return;
  state.data[catId].templates[sgId]=(state.data[catId].templates[sgId]||[]).filter(function(t){return t.id!==tplId;});

}

function openEditRec(catId,sgId,recId){
  var rec=(state.data[catId].records[sgId]||[]).find(function(r){return r.id===recId;});if(!rec)return;
  modalMode='edit-rec';modalCat=catId;modalDelTarget=sgId;modalRecTarget=recId;

  document.getElementById('modal-fields').innerHTML=
    '<div class="modal-field"><label>날짜</label><input id="er-date" type="date" value="'+rec.date+'"></div>'
    +'<div class="modal-field"><label>행사 / 모임명</label><input id="er-name" type="text" value="'+esc(rec.name)+'"></div>'
    +countTableHtml('er-inp',rec.counts||{},'modal-count-table');

  document.getElementById('modal-confirm').className='btn-confirm';

}

function openEdit(type,catId,sgId){
  modalMode='edit-'+type;modalCat=catId;modalDelTarget=sgId||null;
  var name='';
  if(type==='cat'){var cat=state.cats.find(function(c){return c.id===catId;});name=cat?cat.name:'';}
  else{var grp=state.data[catId].groups.find(function(g){return g.id===sgId;});name=grp?grp.name:'';}

}

function openDel(type,catId,sgId){
  modalMode='del-'+type;modalCat=catId;modalDelTarget=sgId||null;
  var name='',cnt=0;
  if(type==='cat'){var cat=state.cats.find(function(c){return c.id===catId;});name=cat?cat.name:'';cnt=Object.values(state.data[catId].records||{}).reduce(function(s,a){return s+a.length;},0);}
  else{var grp=state.data[catId].groups.find(function(g){return g.id===sgId;});name=grp?grp.name:'';cnt=(state.data[catId].records[sgId]||[]).length;}
  var label=type==='cat'?'카테고리':'그룹';
  document.getElementById('modal-title').textContent=label+' 삭제';
  document.getElementById('modal-desc').innerHTML='<strong>"'+esc(name)+'"</strong> '+label+(cnt>0?'와 모든 기록 <strong>'+cnt+'건</strong>':'')+'을 삭제하려면<br>'+label+' 이름을 정확히 입력하세요.';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><input id="modal-input" type="text" maxlength="30" placeholder="'+esc(name)+'"></div>';
  document.getElementById('modal-confirm').textContent='삭제';
  document.getElementById('modal-confirm').className='btn-confirm danger';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var i=document.getElementById('modal-input');if(i)i.focus();},50);
}

function openModal(mode,catId){
  modalMode=mode;modalCat=catId||null;
  document.getElementById('modal-title').textContent=mode==='cat'?'카테고리 추가':'그룹 추가';
  document.getElementById('modal-desc').textContent='';
  document.getElementById('modal-fields').innerHTML='<div class="modal-field"><input id="modal-input" type="text" maxlength="30" placeholder="'+(mode==='cat'?'예) 봉사활동':'예) 농구동아리')+'"></div>';
  document.getElementById('modal-confirm').textContent='추가';
  document.getElementById('modal-confirm').className='btn-confirm';
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){var i=document.getElementById('modal-input');if(i)i.focus();},50);
}

function closeModal(){document.getElementById('modal').style.display='none';}

function confirmModal(){
  if(modalMode==='edit-rec'){
    var date=document.getElementById('er-date').value;
    var name=document.getElementById('er-name').value.trim();
    var counts=getTableCounts('er-inp');
    if(!name){showToast('행사/모임명을 입력해 주세요');return;}
    if(!date){showToast('날짜를 선택해 주세요');return;}
    var rec=(state.data[modalCat].records[modalDelTarget]||[]).find(function(r){return r.id===modalRecTarget;});
    if(rec){rec.date=date;rec.name=name;rec.counts=counts;}
    persist();closeModal();renderPanels();showToast('기록이 수정되었습니다');return;
  }
  if(modalMode==='add-tpl'){
    var n=document.getElementById('tpl-name').value.trim();
    var day=parseInt(document.getElementById('tpl-day').value);
    if(!n){showToast('강좌명을 입력해 주세요');return;}
    if(!state.data[modalCat].templates[modalDelTarget])state.data[modalCat].templates[modalDelTarget]=[];
    state.data[modalCat].templates[modalDelTarget].push({id:Date.now()+'',name:n,day:day});
    persist();closeModal();renderPanels();showToast('"'+n+'" 템플릿이 추가되었습니다');return;
  }
  if(modalMode==='edit-tpl'){
    var n2=document.getElementById('tpl-edit-name').value.trim();
    var day2=parseInt(document.getElementById('tpl-edit-day').value);
    if(!n2){showToast('강좌명을 입력해 주세요');return;}
    var tpl=(state.data[modalCat].templates[modalDelTarget]||[]).find(function(t){return t.id===modalRecTarget;});
    if(tpl){tpl.name=n2;tpl.day=day2;}
    persist();closeModal();renderPanels();showToast('템플릿이 수정되었습니다');return;
  }
  if(modalMode==='use-tpl'){
    var tpl2=(state.data[modalCat].templates[modalDelTarget]||[]).find(function(t){return t.id===modalRecTarget;});if(!tpl2)return;
    var date2=document.getElementById('tpl-date').value;
    var counts2=getTableCounts('tpl-inp');
    if(!date2){showToast('날짜를 선택해 주세요');return;}
    if(sumCounts(counts2)===0){showToast('인원 수를 입력해 주세요');return;}
    if(!state.data[modalCat].records[modalDelTarget])state.data[modalCat].records[modalDelTarget]=[];
    state.data[modalCat].records[modalDelTarget].push({id:Date.now()+'',date:date2,name:tpl2.name,counts:counts2});
    persist();closeModal();renderPanels();showToast('기록이 추가되었습니다');return;
  }
  if(modalMode==='edit-cat'||modalMode==='edit-sg'){
    var inp=document.getElementById('modal-input');var val=inp?inp.value.trim():'';
    if(!val){showToast('이름을 입력해 주세요');return;}
    if(modalMode==='edit-cat'){var cat=state.cats.find(function(c){return c.id===modalCat;});if(cat)cat.name=val;}
    else{var grp=state.data[modalCat].groups.find(function(g){return g.id===modalDelTarget;});if(grp)grp.name=val;}
    persist();closeModal();render();showToast('이름이 수정되었습니다');return;
  }
  if(modalMode==='del-cat'||modalMode==='del-sg'){
    var inp2=document.getElementById('modal-input');var val2=inp2?inp2.value.trim():'';
    var isCat=modalMode==='del-cat';
    var tn=isCat?(state.cats.find(function(c){return c.id===modalCat;})||{}).name:(state.data[modalCat].groups.find(function(g){return g.id===modalDelTarget;})||{}).name;
    if(val2!==tn){if(inp2){inp2.className='error';inp2.classList.remove('shake');void inp2.offsetWidth;inp2.classList.add('shake');}showToast('이름이 일치하지 않아요');return;}
    closeModal();
    if(isCat){state.cats=state.cats.filter(function(c){return c.id!==modalCat;});delete state.data[modalCat];delete curSg[modalCat];delete filters[modalCat];delete dashSg[modalCat];delete dashFrom[modalCat];delete dashTo[modalCat];curCat=state.cats.length?state.cats[0].id:'';persist();render();showToast('카테고리가 삭제되었습니다');}
    else{state.data[modalCat].groups=state.data[modalCat].groups.filter(function(g){return g.id!==modalDelTarget;});delete state.data[modalCat].records[modalDelTarget];curSg[modalCat]=state.data[modalCat].groups.length?state.data[modalCat].groups[0].id:null;persist();renderPanels();showToast('그룹이 삭제되었습니다');}
    return;
  }
  var inp3=document.getElementById('modal-input');var val3=inp3?inp3.value.trim():'';
  if(!val3){showToast('이름을 입력해 주세요');return;}
  if(modalMode==='cat'){var id='cat-'+Date.now();state.cats.push({id:id,name:val3});state.data[id]={groups:[],records:{},templates:{}};filters[id]={from:'',to:''};dashSg[id]='all';dashFrom[id]='';dashTo[id]='';curCat=id;persist();closeModal();render();showToast('"'+val3+'" 카테고리가 추가되었습니다');}
  else{var id2='sg-'+Date.now();state.data[modalCat].groups.push({id:id2,name:val3});state.data[modalCat].records[id2]=[];if(!state.data[modalCat].templates)state.data[modalCat].templates={};state.data[modalCat].templates[id2]=[];curSg[modalCat]=id2;persist();closeModal();renderPanels();showToast('"'+val3+'" 그룹이 추가되었습니다');}
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

loadFromSheet();
